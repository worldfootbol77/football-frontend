<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Scorio - نتائج مباريات كرة القدم</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #1f2a3e;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #a0b3c8;
      --green: #4ade80;
      --red: #e63946;
      --blue: #58a6ff;
      --orange: #f97316;
      --yellow: #f59e0b;
    }

    body {
      font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 0;
      max-width: 650px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 70px;
    }

    .app-header {
      position: sticky;
      top: 0;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }
    .logo { font-size: 1.4rem; font-weight: 900; }
    .logo span { color: var(--blue); }
    .hdr-btn {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.3rem;
    }

    .status-tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 57px;
      z-index: 99;
    }
    .status-tab {
      flex: 1;
      padding: 0.7rem;
      text-align: center;
      background: none;
      border: none;
      color: var(--text2);
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
    }
    .status-tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }
    .live-badge {
      background: var(--red);
      color: white;
      border-radius: 10px;
      padding: 0.1rem 0.4rem;
      font-size: 0.65rem;
      margin-right: 0.3rem;
    }
    .hidden { display: none !important; }

    .date-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.6rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .date-pill {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 25px;
      padding: 0.4rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
    }
    .date-nav {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 34px;
      height: 34px;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .league-sep {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.8rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text2);
      cursor: pointer;
    }
    .league-sep .chevron { margin-right: auto; transition: transform 0.2s; }
    .league-sep.collapsed .chevron { transform: rotate(-90deg); }
    .league-matches.hidden { display: none; }

    .match-card {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .match-card:active { background: var(--bg3); }
    .match-card.live { border-right: 3px solid var(--red); }
    
    .match-league {
      font-size: 0.65rem;
      color: var(--text2);
      text-align: right;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.3rem;
    }
    .match-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.3rem;
    }
    .match-team {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }
    .match-logo { width: 28px; height: 28px; object-fit: contain; }
    .match-team-name { font-weight: 700; font-size: 0.8rem; text-align: center; }
    .match-score { font-size: 1.2rem; font-weight: 900; min-width: 55px; text-align: center; }
    .match-score.live { color: var(--red); }
    .match-status { font-size: 0.65rem; color: var(--text2); text-align: center; margin-top: 0.3rem; }
    .live-badge-small { background: var(--red); color: white; font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 4px; }

    .loading, .empty-state { text-align: center; padding: 3rem; color: var(--text2); }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      max-width: 650px;
      width: 100%;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    .bn-item {
      flex: 1;
      padding: 0.6rem;
      text-align: center;
      background: none;
      border: none;
      color: var(--text2);
      font-weight: 700;
      cursor: pointer;
    }
    .bn-item.active { color: var(--blue); }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 200;
    }
    .modal-content {
      background: var(--bg2);
      border-radius: 15px 15px 0 0;
      padding: 1.5rem;
      width: 100%;
      max-width: 650px;
    }
    .modal-selects { display: flex; gap: 0.5rem; margin: 1rem 0; }
    .modal-selects select {
      flex: 1;
      padding: 0.5rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
    }
    .modal-buttons { display: flex; gap: 0.5rem; }
    .modal-btn {
      flex: 1;
      padding: 0.6rem;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
    .modal-btn.primary { background: var(--blue); color: white; }
    .modal-btn.secondary { background: var(--bg3); color: var(--text2); }

    .refresh-bar {
      position: fixed;
      bottom: 65px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg3);
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.7rem;
      display: none;
      z-index: 200;
    }
    .refresh-bar.visible { display: block; }
    .refresh-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      margin-left: 0.3rem;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 50% { opacity: 0.3; } }

    .divider { height: 0.4rem; background: var(--bg); }
  </style>
</head>
<body>

<header class="app-header">
  <button class="hdr-btn" id="btn-menu">☰</button>
  <div class="logo">Scorio <span>⚽</span></div>
  <button class="hdr-btn" id="btn-cal">📅</button>
</header>

<div class="status-tabs">
  <button class="status-tab active" data-filter="all">الكل</button>
  <button class="status-tab" data-filter="live">مباشر <span id="live-count" class="live-badge hidden">0</span></button>
  <button class="status-tab" data-filter="pre">القادمة</button>
  <button class="status-tab" data-filter="post">انتهت</button>
</div>

<div class="date-bar">
  <button class="date-nav" id="prev-day">›</button>
  <button class="date-pill" id="date-pill">اليوم</button>
  <button class="date-nav" id="next-day">‹</button>
</div>

<div id="matches-container">
  <div class="loading"><div class="spinner"></div>جارٍ تحميل المباريات...</div>
</div>

<nav class="bottom-nav">
  <button class="bn-item active" id="nav-matches">⚽ المباريات</button>
  <button class="bn-item" id="nav-league">🏆 بطولات</button>
</nav>

<div class="refresh-bar" id="refresh-bar">
  <span class="refresh-dot"></span> يتم التحديث تلقائياً
</div>

<script>
  const WORKER_URL = 'https://football-worker.mahdijadir38.workers.dev';
  
  // قائمة أسماء وأعلام الدوريات الكاملة
  const LEAGUE_NAMES = {
    // أوروبا - الدوريات
    'eng.1': { name: 'الدوري الإنجليزي الممتاز', flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
    'esp.1': { name: 'الدوري الإسباني', flag: '🇪🇸' },
    'ger.1': { name: 'الدوري الألماني', flag: '🇩🇪' },
    'ita.1': { name: 'الدوري الإيطالي', flag: '🇮🇹' },
    'fra.1': { name: 'الدوري الفرنسي', flag: '🇫🇷' },
    'por.1': { name: 'الدوري البرتغالي', flag: '🇵🇹' },
    'ned.1': { name: 'الدوري الهولندي', flag: '🇳🇱' },
    'sco.1': { name: 'الدوري الاسكتلندي', flag: '🏴󠁧󠁢󠁳󠁣󠁴󠁿' },
    'bel.1': { name: 'الدوري البلجيكي', flag: '🇧🇪' },
    'gre.1': { name: 'الدوري اليوناني', flag: '🇬🇷' },
    'rus.1': { name: 'الدوري الروسي', flag: '🇷🇺' },
    'tur.1': { name: 'الدوري التركي', flag: '🇹🇷' },
    // الشرق الأوسط
    'ksa.1': { name: 'الدوري السعودي', flag: '🇸🇦' },
    'qat.1': { name: 'الدوري القطري', flag: '🇶🇦' },
    'uae.pro': { name: 'دوري الخليج العربي', flag: '🇦🇪' },
    'egy.1': { name: 'الدوري المصري', flag: '🇪🇬' },
    'mar.1': { name: 'الدوري المغربي', flag: '🇲🇦' },
    'tun.1': { name: 'الرابطة التونسية', flag: '🇹🇳' },
    // أمريكا
    'bra.1': { name: 'الدوري البرازيلي', flag: '🇧🇷' },
    'arg.1': { name: 'الدوري الأرجنتيني', flag: '🇦🇷' },
    'mex.1': { name: 'ليغا MX', flag: '🇲🇽' },
    'usa.1': { name: 'MLS', flag: '🇺🇸' },
    'col.1': { name: 'الدوري الكولومبي', flag: '🇨🇴' },
    'chl.1': { name: 'الدوري التشيلي', flag: '🇨🇱' },
    // بطولات آسيا وأفريقيا
    'afc.champions': { name: 'دوري أبطال آسيا', flag: '🏆' },
    'caf.champions': { name: 'دوري أبطال أفريقيا', flag: '🏆' },
    'afc.asian_cup': { name: 'كأس آسيا', flag: '🏆' },
    // بطولات أوروبا
    'uefa.champions': { name: 'دوري أبطال أوروبا', flag: '🏆' },
    'uefa.europa': { name: 'الدوري الأوروبي', flag: '🏆' },
    'uefa.europa.conf': { name: 'دوري المؤتمر الأوروبي', flag: '🏆' },
    'uefa.euro': { name: 'بطولة أمم أوروبا', flag: '🏆' },
    'uefa.nations': { name: 'دوري الأمم الأوروبية', flag: '🏆' },
    // بطولات أمريكا
    'conmebol.libertadores': { name: 'كوبا ليبرتادوريس', flag: '🏆' },
    'conmebol.sudamericana': { name: 'كوبا سوداميريكانا', flag: '🏆' },
    'conmebol.america': { name: 'كوبا أمريكا', flag: '🏆' },
    // دولية
    'fifa.world': { name: 'كأس العالم', flag: '🌍' },
    'fifa.cwc': { name: 'كأس العالم للأندية', flag: '🌍' },
    // وديات
    'friendly.national': { name: 'مباراة ودية', flag: '🤝' },
    'friendly.club': { name: 'مباراة ودية', flag: '🤝' }
  };

  function getLeagueDisplay(leagueCode, originalName) {
    if (LEAGUE_NAMES[leagueCode]) {
      return LEAGUE_NAMES[leagueCode];
    }
    // محاولة استخراج اسم الدوري من النص الأصلي
    let name = originalName || leagueCode;
    // تنظيف الاسم
    name = name.replace(/ at /g, ' - ').replace(/ \(.*\)/g, '');
    return { name: name, flag: '⚽' };
  }

  // دوال مساعدة للتاريخ
  function getTodayStr() {
    const d = new Date();
    return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  }

  let currentDate = localStorage.getItem('selectedDate') || getTodayStr();
  let allMatches = [];
  let activeFilter = 'all';
  let refreshTimer = null;

  function formatDateDisplay(dateStr) {
    if (!dateStr || dateStr.length !== 8) return 'اليوم';
    const year = dateStr.slice(0,4);
    const month = dateStr.slice(4,6);
    const day = dateStr.slice(6,8);
    const today = getTodayStr();
    const yesterday = getOffsetDate(-1);
    const tomorrow = getOffsetDate(1);
    
    if (dateStr === today) return 'اليوم';
    if (dateStr === yesterday) return 'أمس';
    if (dateStr === tomorrow) return 'غداً';
    
    const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    return `${parseInt(day)} ${months[parseInt(month)-1]} ${year}`;
  }

  function getOffsetDate(n) {
    const d = new Date();
    d.setDate(d.getDate() + n);
    return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatTime(isoDate) {
    try {
      const d = new Date(isoDate);
      return d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    } catch { return ''; }
  }

  async function fetchMatches() {
    const container = document.getElementById('matches-container');
    container.innerHTML = '<div class="loading"><div class="spinner"></div>جارٍ تحميل المباريات...</div>';
    
    try {
      const url = `${WORKER_URL}/api/matches?date=${currentDate}`;
      console.log('جلب من:', url);
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      allMatches = data.matches || [];
      console.log('عدد المباريات:', allMatches.length);
      updateLiveBadge();
      renderMatches();
      
      localStorage.setItem('selectedDate', currentDate);
      
      const hasLive = allMatches.some(m => m.status === 'in');
      const refreshBar = document.getElementById('refresh-bar');
      if (hasLive) {
        refreshBar.classList.add('visible');
        if (refreshTimer) clearTimeout(refreshTimer);
        refreshTimer = setTimeout(fetchMatches, 60000);
      } else {
        refreshBar.classList.remove('visible');
      }
    } catch (error) {
      console.error('خطأ:', error);
      container.innerHTML = `<div class="empty-state">⚠️ خطأ في التحميل: ${error.message}</div>`;
    }
  }

  function updateLiveBadge() {
    const liveCount = allMatches.filter(m => m.status === 'in').length;
    const badge = document.getElementById('live-count');
    if (liveCount > 0) {
      badge.textContent = liveCount;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  }

  function renderMatches() {
    let filtered = [...allMatches];
    if (activeFilter === 'live') filtered = filtered.filter(m => m.status === 'in');
    else if (activeFilter === 'pre') filtered = filtered.filter(m => m.status === 'pre');
    else if (activeFilter === 'post') filtered = filtered.filter(m => m.status === 'post');
    
    if (filtered.length === 0) {
      document.getElementById('matches-container').innerHTML = '<div class="empty-state">⚽ لا توجد مباريات</div>';
      return;
    }
    
    const groups = {};
    filtered.forEach(m => {
      const leagueKey = m.league || 'other';
      if (!groups[leagueKey]) {
        const leagueInfo = getLeagueDisplay(leagueKey, m.leagueName);
        groups[leagueKey] = { 
          name: leagueInfo.name, 
          flag: leagueInfo.flag,
          matches: [] 
        };
      }
      groups[leagueKey].matches.push(m);
    });
    
    let html = '';
    for (const [leagueKey, group] of Object.entries(groups)) {
      html += `
        <div class="league-sep" onclick="this.classList.toggle('collapsed'); this.nextElementSibling.classList.toggle('hidden')">
          <span>${group.flag}</span>
          <span style="flex:1">${group.name}</span>
          <span class="chevron">▼</span>
        </div>
        <div class="league-matches">
      `;
      
      for (const m of group.matches) {
        const isLive = m.status === 'in';
        let scoreHtml, statusHtml;
        
        if (m.status === 'pre') {
          scoreHtml = '<div class="match-score">-:-</div>';
          statusHtml = `<div class="match-status">⏱️ ${formatTime(m.date)}</div>`;
        } else {
          scoreHtml = `<div class="match-score ${isLive ? 'live' : ''}">${m.homeScore || 0} - ${m.awayScore || 0}</div>`;
          if (isLive) {
            statusHtml = `<div class="match-status"><span class="live-badge-small">مباشر</span> ${m.minute || ''}</div>`;
          } else {
            statusHtml = `<div class="match-status">✅ ${m.statusText || 'انتهت'}</div>`;
          }
        }
        
        // بناء رابط المباراة
        const matchLink = `/match.html?id=${m.id}&league=${encodeURIComponent(m.league)}`;
        
        html += `
          <div class="match-card ${isLive ? 'live' : ''}" onclick="window.location.href='${matchLink}'">
            <div class="match-league">
              <span>${group.flag}</span>
              <span>${group.name}</span>
            </div>
            <div class="match-row">
              <div class="match-team">
                ${m.homeLogo ? `<img class="match-logo" src="${m.homeLogo}" onerror="this.style.display='none'">` : ''}
                <div class="match-team-name">${m.homeTeam}</div>
              </div>
              ${scoreHtml}
              <div class="match-team">
                ${m.awayLogo ? `<img class="match-logo" src="${m.awayLogo}" onerror="this.style.display='none'">` : ''}
                <div class="match-team-name">${m.awayTeam}</div>
              </div>
            </div>
            ${statusHtml}
          </div>
        `;
      }
      html += '</div><div class="divider"></div>';
    }
    
    document.getElementById('matches-container').innerHTML = html;
  }

  function changeDate(offset) {
    const d = new Date(`${currentDate.slice(0,4)}-${currentDate.slice(4,6)}-${currentDate.slice(6,8)}`);
    d.setDate(d.getDate() + offset);
    currentDate = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    document.getElementById('date-pill').textContent = formatDateDisplay(currentDate);
    fetchMatches();
  }

  function showDateModal() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <div class="modal-content">
        <h3 style="text-align:center">اختر تاريخاً</h3>
        <div class="modal-selects">
          <select id="modal-day"></select>
          <select id="modal-month">
            <option value="01">يناير</option><option value="02">فبراير</option>
            <option value="03">مارس</option><option value="04">أبريل</option>
            <option value="05">مايو</option><option value="06">يونيو</option>
            <option value="07">يوليو</option><option value="08">أغسطس</option>
            <option value="09">سبتمبر</option><option value="10">أكتوبر</option>
            <option value="11">نوفمبر</option><option value="12">ديسمبر</option>
          </select>
          <select id="modal-year"></select>
        </div>
        <div class="modal-buttons">
          <button class="modal-btn primary" id="modal-ok">عرض</button>
          <button class="modal-btn secondary" id="modal-cancel">إلغاء</button>
        </div>
      </div>
    `;
    
    const daySelect = modal.querySelector('#modal-day');
    for (let i = 1; i <= 31; i++) daySelect.innerHTML += `<option value="${String(i).padStart(2,'0')}">${i}</option>`;
    
    const yearSelect = modal.querySelector('#modal-year');
    const currentYear = new Date().getFullYear();
    for (let i = currentYear; i >= 2020; i--) yearSelect.innerHTML += `<option value="${i}">${i}</option>`;
    
    const now = new Date();
    daySelect.value = String(now.getDate()).padStart(2,'0');
    modal.querySelector('#modal-month').value = String(now.getMonth() + 1).padStart(2,'0');
    yearSelect.value = String(now.getFullYear());
    
    document.body.appendChild(modal);
    
    modal.querySelector('#modal-ok').onclick = () => {
      const y = modal.querySelector('#modal-year').value;
      const m = modal.querySelector('#modal-month').value;
      const d = modal.querySelector('#modal-day').value;
      currentDate = `${y}${m}${d}`;
      document.getElementById('date-pill').textContent = formatDateDisplay(currentDate);
      modal.remove();
      fetchMatches();
