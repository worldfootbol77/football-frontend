<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scorio - مباريات اليوم</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      max-width: 650px;
      margin: 0 auto;
      padding: 1rem;
      padding-bottom: 75px;
    }
    .header { text-align: center; padding: 1rem; background: #161b22; border-radius: 12px; margin-bottom: 1rem; }
    .header h1 { font-size: 1.4rem; } .header h1 span { color: #58a6ff; }
    .date-bar { display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-bottom: 0.8rem; }
    .date-btn { background: #1f2a3e; border: none; color: white; padding: 0.3rem 0.8rem; border-radius: 20px; cursor: pointer; font-family: 'Cairo', sans-serif; }
    .date-pill { background: #58a6ff; color: white; padding: 0.3rem 1.1rem; border-radius: 20px; font-weight: bold; border: none; cursor: pointer; font-family: 'Cairo', sans-serif; min-width: 80px; }
    .filters { display: flex; gap: 0.4rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
    .filter-btn { background: #161b22; border: 1px solid #30363d; color: #8b949e; padding: 0.25rem 0.7rem; border-radius: 20px; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 0.78rem; }
    .filter-btn.active { background: #58a6ff22; border-color: #58a6ff; color: #58a6ff; }
    .league-section { margin-bottom: 0.5rem; }
    .league-header { display: flex; align-items: center; gap: 0.5rem; background: #1f2a3e; padding: 0.45rem 0.8rem; border-radius: 8px 8px 0 0; font-size: 0.78rem; font-weight: bold; }
    .league-flag { font-size: 1rem; }
    .league-name { flex: 1; }
    .league-stage { background: #30363d; color: #8b949e; font-size: 0.63rem; padding: 0.1rem 0.45rem; border-radius: 8px; }
    .league-count { background: #30363d; color: #8b949e; font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 8px; }
    .live-dot { width: 7px; height: 7px; background: #e63946; border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
    .match-card { background: #161b22; border: 1px solid #21262d; border-top: none; padding: 0.65rem 0.8rem; cursor: pointer; transition: background .1s; }
    .match-card:last-child { border-radius: 0 0 8px 8px; }
    .match-card:active { background: #1c2128; }
    .match-card.live { border-right: 3px solid #e63946; }
    .match-inner { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 0.5rem; }
    .team-home { text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 0.3rem; }
    .team-away { text-align: left; display: flex; align-items: center; justify-content: flex-start; gap: 0.3rem; }
    .team-name { font-size: 0.83rem; font-weight: 600; }
    .team-logo { width: 22px; height: 22px; object-fit: contain; }
    .match-center { text-align: center; }
    .score { font-size: 1.15rem; font-weight: 900; letter-spacing: 2px; }
    .score.live { color: #e63946; }
    .match-time { font-size: 0.82rem; color: #8b949e; }
    .match-status { font-size: 0.65rem; color: #8b949e; margin-top: 0.15rem; }
    .match-status.live-s { color: #e63946; font-weight: bold; }
    .minute-pill { background: #e6394622; color: #e63946; font-size: .65rem; font-weight: bold; padding: 0.05rem 0.35rem; border-radius: 4px; }
    .loading { text-align: center; padding: 2.5rem 1rem; color: #8b949e; }
    .spinner { width: 38px; height: 38px; border: 3px solid #21262d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto .8rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); max-width: 650px; width: 100%; background: #161b22; border-top: 1px solid #30363d; display: flex; }
    .nav-item { flex: 1; padding: 0.65rem; background: none; border: none; color: #8b949e; font-family: 'Cairo', sans-serif; font-weight: bold; font-size: 0.82rem; cursor: pointer; }
    .nav-item.active { color: #58a6ff; }
  </style>
</head>
<body>

<div class="header"><h1>⚽ <span>Scorio</span></h1></div>

<div class="date-bar">
  <button class="date-btn" id="nextDay">◀ غداً</button>
  <button class="date-pill" id="dateDisplay">اليوم</button>
  <button class="date-btn" id="prevDay">أمس ▶</button>
</div>

<div class="filters">
  <button class="filter-btn active" data-f="all">الكل</button>
  <button class="filter-btn" data-f="in">🔴 مباشر</button>
  <button class="filter-btn" data-f="post">انتهت</button>
  <button class="filter-btn" data-f="pre">القادمة</button>
</div>

<div id="container">
  <div class="loading"><div class="spinner"></div>جارٍ التحميل...</div>
</div>

<div class="bottom-nav">
  <button class="nav-item active">⚽ المباريات</button>
  <button class="nav-item" onclick="location.href='league.html'">🏆 البطولات</button>
</div>

<script>
const WORKER = 'https://football-worker.mahdijadir38.workers.dev';

// ─── الدوريات المعروفة (بالـ slug) ──────────────────────────────────────────
const KNOWN = {
  'eng.1':{'n':'الدوري الإنجليزي الممتاز','f':'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},
  'esp.1':{'n':'الدوري الإسباني','f':'🇪🇸'},
  'ger.1':{'n':'الدوري الألماني','f':'🇩🇪'},
  'ita.1':{'n':'الدوري الإيطالي','f':'🇮🇹'},
  'fra.1':{'n':'الدوري الفرنسي','f':'🇫🇷'},
  'por.1':{'n':'الدوري البرتغالي','f':'🇵🇹'},
  'ned.1':{'n':'الدوري الهولندي','f':'🇳🇱'},
  'tur.1':{'n':'الدوري التركي','f':'🇹🇷'},
  'sco.1':{'n':'الدوري الاسكتلندي','f':'🏴󠁧󠁢󠁳󠁣󠁴󠁿'},
  'bel.1':{'n':'الدوري البلجيكي','f':'🇧🇪'},
  'gre.1':{'n':'الدوري اليوناني','f':'🇬🇷'},
  'aut.1':{'n':'الدوري النمساوي','f':'🇦🇹'},
  'den.1':{'n':'الدوري الدنماركي','f':'🇩🇰'},
  'nor.1':{'n':'الدوري النرويجي','f':'🇳🇴'},
  'swe.1':{'n':'الدوري السويدي','f':'🇸🇪'},
  'bra.1':{'n':'الدوري البرازيلي','f':'🇧🇷'},
  'bra.2':{'n':'الدوري البرازيلي الدرجة 2','f':'🇧🇷'},
  'arg.1':{'n':'الدوري الأرجنتيني','f':'🇦🇷'},
  'chi.1':{'n':'الدوري التشيلي','f':'🇨🇱'},
  'col.1':{'n':'الدوري الكولومبي','f':'🇨🇴'},
  'mex.1':{'n':'الدوري المكسيكي','f':'🇲🇽'},
  'usa.1':{'n':'MLS','f':'🇺🇸'},
  'ksa.1':{'n':'الدوري السعودي','f':'🇸🇦'},
  'egy.1':{'n':'الدوري المصري','f':'🇪🇬'},
  'jpn.1':{'n':'الدوري الياباني J1','f':'🇯🇵'},
  'chn.1':{'n':'الدوري الصيني','f':'🇨🇳'},
  'fifa.world':{'n':'كأس العالم FIFA','f':'🌍'},
  'fifa.world.u20':{'n':'كأس العالم للشباب U20','f':'🌍'},
  'uefa.champions':{'n':'دوري أبطال أوروبا','f':'⭐'},
  'uefa.europa':{'n':'الدوري الأوروبي','f':'🟠'},
  'uefa.euro':{'n':'بطولة أمم أوروبا','f':'🇪🇺'},
  'uefa.nations':{'n':'دوري الأمم الأوروبية','f':'🇪🇺'},
  'caf.nations':{'n':'كأس أمم أفريقيا','f':'🌍'},
  'caf.champions':{'n':'دوري أبطال أفريقيا','f':'🌍'},
  'concacaf.gold':{'n':'كأس الكونكاكاف الذهبية','f':'🌎'},
  'conmebol.libertadores':{'n':'كوبا ليبرتادوريس','f':'🌎'},
  'conmebol.sudamericana':{'n':'كوبا سوداميريكانا','f':'🌎'},
  'afc.champions':{'n':'دوري أبطال آسيا','f':'🌏'},
};

// الـ slugs الغامضة التي تحتاج اكتشافاً
const AMBIGUOUS = new Set(['group-stage','regular-season','first-stage','second-stage',
  'finals','final','semifinals','quarterfinals','round-of-16','playoffs',
  '3rd-place-match','knockout-round']);

const STAGE_AR = {
  'group-stage':'دور المجموعات','regular-season':'الدوري',
  'finals':'النهائي','final':'النهائي','semifinals':'نصف النهائي',
  'quarterfinals':'ربع النهائي','round-of-16':'دور الـ16',
  'playoffs':'الإقصائيات','3rd-place-match':'مباراة المركز الثالث',
  'first-stage':'الدور الأول','second-stage':'الدور الثاني',
};

// ─── Cache للأسماء المكتشفة ──────────────────────────────────────────────────
const leagueCache = {};

// ─── الحالة ──────────────────────────────────────────────────────────────────
let currentDate  = new Date();
let allMatches   = [];
let activeFilter = 'all';
let refreshTimer = null;

// ─── Helpers ─────────────────────────────────────────────────────────────────
function fmtApi(d) {
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDisplay(d) {
  const t = new Date();
  const yd = new Date(t); yd.setDate(t.getDate()-1);
  const tm = new Date(t); tm.setDate(t.getDate()+1);
  if (fmtApi(d)===fmtApi(t))  return 'اليوم';
  if (fmtApi(d)===fmtApi(yd)) return 'أمس';
  if (fmtApi(d)===fmtApi(tm)) return 'غداً';
  const M=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  return `${d.getDate()} ${M[d.getMonth()]}`;
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
}

// ─── اكتشاف اسم البطولة من الـ Worker ────────────────────────────────────────
async function discoverLeagueName(matchId, cacheKey) {
  if (leagueCache[cacheKey]) return leagueCache[cacheKey];
  try {
    const r = await fetch(`${WORKER}/api/league-info?matchId=${matchId}`);
    if (!r.ok) throw new Error();
    const d = await r.json();
    if (d.name) {
      const info = { name: d.name, slug: d.slug, flag: '⚽' };
      leagueCache[cacheKey] = info;
      return info;
    }
  } catch {}
  return null;
}

// ─── جلب المباريات ────────────────────────────────────────────────────────────
async function loadMatches() {
  clearTimeout(refreshTimer);
  document.getElementById('container').innerHTML =
    '<div class="loading"><div class="spinner"></div>جارٍ التحميل...</div>';
  try {
    const res  = await fetch(`${WORKER}/api/matches?date=${fmtApi(currentDate)}`);
    const data = await res.json();
    allMatches = data.matches || [];

    // ─── تجميع المباريات بالـ slug أولاً ─────────────────────────────────────
    const groups = {};
    const order  = [];
    for (const m of allMatches) {
      // Worker الجديد → leagueId | Worker القديم → league slug
      const key = m.leagueId || m.league || 'other';
      if (!groups[key]) { groups[key] = []; order.push(key); }
      groups[key].push(m);
    }

    // ─── اكتشاف الأسماء للـ slugs الغامضة بالتوازي ───────────────────────────
    // فقط للمجموعات التي لا نعرف اسمها من القاموس الثابت
    const discoveries = [];
    for (const key of order) {
      const slug = groups[key][0].league || key;
      if (!KNOWN[slug] && !leagueCache[key] && !m?.leagueName) {
        const firstId = groups[key][0].id;
        discoveries.push(discoverLeagueName(firstId, key));
      } else {
        discoveries.push(Promise.resolve(null));
      }
    }
    await Promise.all(discoveries);

    render(groups, order);
  } catch (e) {
    document.getElementById('container').innerHTML =
      `<div class="loading">⚠️ خطأ: ${e.message}</div>`;
  }
}

// ─── عرض المباريات ────────────────────────────────────────────────────────────
function render(groups, order) {
  const filterFn = m => activeFilter === 'all' || m.status === activeFilter;

  let html = '';
  for (const key of order) {
    const matches = groups[key].filter(filterFn);
    if (!matches.length) continue;

    const first = matches[0];
    const slug  = first.league || key;

    // تحديد اسم وعلم البطولة بهذا الترتيب:
    // 1) Worker الجديد (leagueName مباشر)
    // 2) القاموس الثابت KNOWN[slug]
    // 3) Cache من اكتشاف سابق
    // 4) تحويل الـ slug لاسم قابل للقراءة
    let name, flag, stage = '';

    if (first.leagueName && first.leagueFlag) {
      // Worker جديد
      name  = first.leagueName;
      flag  = first.leagueFlag;
      stage = first.leagueStage || '';
    } else if (KNOWN[slug]) {
      name  = KNOWN[slug].n;
      flag  = KNOWN[slug].f;
      stage = STAGE_AR[slug] || '';
    } else if (leagueCache[key]) {
      name  = leagueCache[key].name;
      flag  = '⚽';
      stage = STAGE_AR[slug] || '';
    } else {
      // آخر حل — تحويل slug لاسم مقروء
      name  = slug.replace(/^\d{4}-/,'').replace(/-/g,' ')
               .split(' ').map(w=>w[0]?.toUpperCase()+w.slice(1)).join(' ');
      flag  = '⚽';
      stage = STAGE_AR[slug] || '';
    }

    const liveCount = matches.filter(m=>m.status==='in').length;

    html += `
      <div class="league-section">
        <div class="league-header">
          <span class="league-flag">${flag}</span>
          <span class="league-name">${name}</span>
          ${stage ? `<span class="league-stage">${stage}</span>` : ''}
          ${liveCount > 0 ? `<span class="live-dot"></span>` : ''}
          <span class="league-count">${matches.length}</span>
        </div>
        ${matches.map(matchCard).join('')}
      </div>`;
  }

  document.getElementById('container').innerHTML = html || '<div class="loading">⚽ لا توجد مباريات</div>';

  const hasLive = allMatches.some(m=>m.status==='in');
  if (hasLive) refreshTimer = setTimeout(loadMatches, 90000);
}

// ─── بطاقة مباراة ────────────────────────────────────────────────────────────
function matchCard(m) {
  const isLive = m.status === 'in';
  const isPre  = m.status === 'pre';
  const center = isPre
    ? `<div class="match-time">${fmtTime(m.date)}</div>`
    : `<div class="score ${isLive?'live':''}">${m.homeScore??0} - ${m.awayScore??0}</div>`;
  const statusLine = isLive
    ? `<div class="match-status live-s"><span class="minute-pill">${m.minute||'LIVE'}</span></div>`
    : !isPre ? `<div class="match-status">${m.statusText||'انتهت'}</div>` : '';
  const hl = m.homeLogo ? `<img class="team-logo" src="${m.homeLogo}" onerror="this.style.display='none'" alt="">` : '';
  const al = m.awayLogo ? `<img class="team-logo" src="${m.awayLogo}" onerror="this.style.display='none'" alt="">` : '';

  return `
    <div class="match-card ${isLive?'live':''}"
         onclick="location.href='match.html?id=${m.id}&league=${m.league||''}'">
      <div class="match-inner">
        <div class="team-home"><span class="team-name">${m.homeTeam}</span>${hl}</div>
        <div class="match-center">${center}${statusLine}</div>
        <div class="team-away">${al}<span class="team-name">${m.awayTeam}</span></div>
      </div>
    </div>`;
}

// ─── أحداث ────────────────────────────────────────────────────────────────────
document.getElementById('prevDay').onclick = () => {
  currentDate.setDate(currentDate.getDate()-1);
  document.getElementById('dateDisplay').textContent = fmtDisplay(currentDate);
  loadMatches();
};
document.getElementById('nextDay').onclick = () => {
  currentDate.setDate(currentDate.getDate()+1);
  document.getElementById('dateDisplay').textContent = fmtDisplay(currentDate);
  loadMatches();
};
document.getElementById('dateDisplay').onclick = () => {
  currentDate = new Date();
  document.getElementById('dateDisplay').textContent = fmtDisplay(currentDate);
  loadMatches();
};
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.f;
    // إعادة رسم من البيانات المخزنة فقط (بدون طلب جديد)
    const groups={}, order=[];
    for (const m of allMatches) {
      const key = m.leagueId || m.league || 'other';
      if (!groups[key]) { groups[key]=[]; order.push(key); }
      groups[key].push(m);
    }
    render(groups, order);
  });
});

// ─── تشغيل ────────────────────────────────────────────────────────────────────
document.getElementById('dateDisplay').textContent = fmtDisplay(currentDate);
loadMatches();
</script>
</body>
</html>
