<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كورة لايف - مباريات اليوم</title>
  <meta name="description" content="نتائج مباريات كرة القدم اليوم مباشر - جميع الدوريات والبطولات العالمية">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body data-page="matches">

  <header class="site-header">
    <div class="header-inner">
      <div class="site-logo">كورة <span>لايف</span></div>
      <nav style="display:flex;gap:1rem;font-size:0.88rem">
        <a href="/" style="color:var(--blue)">المباريات</a>
        <a href="/standings" style="color:var(--text2)">الترتيب</a>
        <a href="/scorers" style="color:var(--text2)">الهدافون</a>
        <a href="/fixtures" style="color:var(--text2)">القادمة</a>
      </nav>
    </div>
  </header>

  <div class="date-bar">
    <div class="date-bar-inner">
      <button class="date-btn" id="btn-yesterday">أمس</button>
      <button class="date-btn active" id="btn-today">اليوم</button>
      <button class="date-btn" id="btn-tomorrow">غداً</button>
      <div style="display:flex;align-items:center;gap:0.3rem;margin-right:0.5rem">
        <select id="pick-day" class="date-select" title="اليوم"></select>
        <select id="pick-month" class="date-select" title="الشهر">
          <option value="01">يناير</option><option value="02">فبراير</option>
          <option value="03">مارس</option><option value="04">أبريل</option>
          <option value="05">مايو</option><option value="06">يونيو</option>
          <option value="07">يوليو</option><option value="08">أغسطس</option>
          <option value="09">سبتمبر</option><option value="10">أكتوبر</option>
          <option value="11">نوفمبر</option><option value="12">ديسمبر</option>
        </select>
        <select id="pick-year" class="date-select" title="السنة"></select>
        <button class="date-btn" id="btn-go-date" style="padding:0.3rem 0.7rem">عرض</button>
      </div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">الكل</button>
    <button class="filter-btn" data-filter="in">مباشر 🔴</button>
    <button class="filter-btn" data-filter="post">انتهت</button>
    <button class="filter-btn" data-filter="pre">القادمة</button>
  </div>

  <div class="main-layout">
    <aside class="sidebar">
      <div class="sidebar-title">الدوريات</div>
      <button class="sidebar-league active" data-league="all"><span class="league-dot"></span> جميع الدوريات</button>

      <div class="sidebar-group-label">UEFA</div>
      <button class="sidebar-league" data-league="uefa.champions"><span class="league-dot"></span> Champions League</button>
      <button class="sidebar-league" data-league="uefa.europa"><span class="league-dot"></span> Europa League</button>
      <button class="sidebar-league" data-league="uefa.europa.conf"><span class="league-dot"></span> Conference League</button>
      <button class="sidebar-league" data-league="uefa.euro"><span class="league-dot"></span> UEFA Euro</button>
      <button class="sidebar-league" data-league="uefa.nations"><span class="league-dot"></span> Nations League</button>

      <div class="sidebar-group-label">إنجلترا</div>
      <button class="sidebar-league" data-league="eng.1"><span class="league-dot"></span> Premier League</button>
      <button class="sidebar-league" data-league="eng.2"><span class="league-dot"></span> Championship</button>
      <button class="sidebar-league" data-league="eng.fa"><span class="league-dot"></span> FA Cup</button>
      <button class="sidebar-league" data-league="eng.league_cup"><span class="league-dot"></span> EFL Cup</button>

      <div class="sidebar-group-label">إسبانيا</div>
      <button class="sidebar-league" data-league="esp.1"><span class="league-dot"></span> La Liga</button>
      <button class="sidebar-league" data-league="esp.2"><span class="league-dot"></span> La Liga 2</button>
      <button class="sidebar-league" data-league="esp.copa_del_rey"><span class="league-dot"></span> Copa del Rey</button>

      <div class="sidebar-group-label">ألمانيا</div>
      <button class="sidebar-league" data-league="ger.1"><span class="league-dot"></span> Bundesliga</button>
      <button class="sidebar-league" data-league="ger.2"><span class="league-dot"></span> 2. Bundesliga</button>
      <button class="sidebar-league" data-league="ger.dfb_pokal"><span class="league-dot"></span> DFB Pokal</button>

      <div class="sidebar-group-label">إيطاليا</div>
      <button class="sidebar-league" data-league="ita.1"><span class="league-dot"></span> Serie A</button>
      <button class="sidebar-league" data-league="ita.2"><span class="league-dot"></span> Serie B</button>
      <button class="sidebar-league" data-league="ita.coppa_italia"><span class="league-dot"></span> Coppa Italia</button>

      <div class="sidebar-group-label">فرنسا</div>
      <button class="sidebar-league" data-league="fra.1"><span class="league-dot"></span> Ligue 1</button>
      <button class="sidebar-league" data-league="fra.2"><span class="league-dot"></span> Ligue 2</button>
      <button class="sidebar-league" data-league="fra.coupe_de_france"><span class="league-dot"></span> Coupe de France</button>

      <div class="sidebar-group-label">أوروبا</div>
      <button class="sidebar-league" data-league="por.1"><span class="league-dot"></span> Primeira Liga</button>
      <button class="sidebar-league" data-league="ned.1"><span class="league-dot"></span> Eredivisie</button>
      <button class="sidebar-league" data-league="tur.1"><span class="league-dot"></span> Süper Lig</button>
      <button class="sidebar-league" data-league="rus.1"><span class="league-dot"></span> Russian PL</button>
      <button class="sidebar-league" data-league="sco.1"><span class="league-dot"></span> Scottish PL</button>
      <button class="sidebar-league" data-league="bel.1"><span class="league-dot"></span> Belgian Pro</button>
      <button class="sidebar-league" data-league="pol.1"><span class="league-dot"></span> Ekstraklasa</button>
      <button class="sidebar-league" data-league="gre.1"><span class="league-dot"></span> Super League</button>
      <button class="sidebar-league" data-league="aut.1"><span class="league-dot"></span> Austrian BL</button>
      <button class="sidebar-league" data-league="sui.1"><span class="league-dot"></span> Swiss SL</button>
      <button class="sidebar-league" data-league="den.1"><span class="league-dot"></span> Superliga</button>
      <button class="sidebar-league" data-league="nor.1"><span class="league-dot"></span> Eliteserien</button>
      <button class="sidebar-league" data-league="swe.1"><span class="league-dot"></span> Allsvenskan</button>
      <button class="sidebar-league" data-league="ukr.1"><span class="league-dot"></span> Ukrainian PL</button>

      <div class="sidebar-group-label">الخليج والعرب</div>
      <button class="sidebar-league" data-league="ksa.1"><span class="league-dot"></span> الدوري السعودي</button>
      <button class="sidebar-league" data-league="qat.1"><span class="league-dot"></span> الدوري القطري</button>
      <button class="sidebar-league" data-league="are.1"><span class="league-dot"></span> دوري الخليج</button>
      <button class="sidebar-league" data-league="kwt.1"><span class="league-dot"></span> الدوري الكويتي</button>
      <button class="sidebar-league" data-league="irq.1"><span class="league-dot"></span> الدوري العراقي</button>
      <button class="sidebar-league" data-league="jor.1"><span class="league-dot"></span> الدوري الأردني</button>
      <button class="sidebar-league" data-league="egy.1"><span class="league-dot"></span> الدوري المصري</button>
      <button class="sidebar-league" data-league="mar.1"><span class="league-dot"></span> الدوري المغربي</button>
      <button class="sidebar-league" data-league="tun.1"><span class="league-dot"></span> الرابطة التونسية</button>
      <button class="sidebar-league" data-league="dza.1"><span class="league-dot"></span> الرابطة الجزائرية</button>

      <div class="sidebar-group-label">أمريكا</div>
      <button class="sidebar-league" data-league="conmebol.libertadores"><span class="league-dot"></span> Libertadores</button>
      <button class="sidebar-league" data-league="conmebol.sudamericana"><span class="league-dot"></span> Sudamericana</button>
      <button class="sidebar-league" data-league="bra.1"><span class="league-dot"></span> Brasileirao</button>
      <button class="sidebar-league" data-league="arg.1"><span class="league-dot"></span> Liga Profesional</button>
      <button class="sidebar-league" data-league="mex.1"><span class="league-dot"></span> Liga MX</button>
      <button class="sidebar-league" data-league="usa.1"><span class="league-dot"></span> MLS</button>

      <div class="sidebar-group-label">آسيا وأفريقيا</div>
      <button class="sidebar-league" data-league="afc.champions"><span class="league-dot"></span> AFC Champions</button>
      <button class="sidebar-league" data-league="caf.champions"><span class="league-dot"></span> CAF Champions</button>
      <button class="sidebar-league" data-league="jpn.1"><span class="league-dot"></span> J1 League</button>
      <button class="sidebar-league" data-league="kor.1"><span class="league-dot"></span> K League</button>
      <button class="sidebar-league" data-league="chn.1"><span class="league-dot"></span> Chinese SL</button>

      <div class="sidebar-group-label">عالمي</div>
      <button class="sidebar-league" data-league="fifa.world"><span class="league-dot"></span> كأس العالم</button>
      <button class="sidebar-league" data-league="fifa.cwc"><span class="league-dot"></span> Club World Cup</button>
      <button class="sidebar-league" data-league="caf.nations"><span class="league-dot"></span> أمم أفريقيا</button>
      <button class="sidebar-league" data-league="afc.asian_cup"><span class="league-dot"></span> كأس آسيا</button>
      <button class="sidebar-league" data-league="conmebol.america"><span class="league-dot"></span> Copa América</button>
      <button class="sidebar-league" data-league="friendly.national"><span class="league-dot"></span> مباريات ودية</button>
    </aside>

    <main class="matches-area">
      <div id="matches-container">
        <div class="loading-spinner">
          <div class="spinner"></div>
          <div>جارٍ تحميل المباريات...</div>
        </div>
      </div>
    </main>
  </div>

  <div class="refresh-bar" id="refresh-bar"></div>
  <script src="/assets/js/app.js"></script>
</body>
</html>
