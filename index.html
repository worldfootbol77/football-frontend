<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scorio - مباريات اليوم</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      max-width: 650px;
      margin: 0 auto;
      padding: 1rem;
      padding-bottom: 70px;
    }
    .header { text-align: center; padding: 1rem; background: #161b22; border-radius: 12px; margin-bottom: 1rem; }
    .date-bar { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1rem; }
    .date-btn { background: #1f2a3e; border: none; color: white; padding: 0.3rem 0.8rem; border-radius: 20px; cursor: pointer; }
    .date-pill { background: #58a6ff; color: white; padding: 0.3rem 1rem; border-radius: 20px; font-weight: bold; cursor: pointer; }
    .match-card { background: #161b22; border-radius: 10px; padding: 0.8rem; margin-bottom: 0.5rem; cursor: pointer; }
    .match-card:active { background: #1f2a3e; }
    .match-teams { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .team { flex: 1; text-align: center; }
    .team-name { font-size: 0.85rem; font-weight: bold; }
    .score { font-size: 1.2rem; font-weight: 900; min-width: 60px; text-align: center; }
    .score.live { color: #e63946; }
    .status { font-size: 0.65rem; color: #8b949e; text-align: center; margin-top: 0.3rem; }
    .loading { text-align: center; padding: 2rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .bottom-nav { position: fixed; bottom: 0; max-width: 650px; width: 100%; background: #161b22; border-top: 1px solid #30363d; display: flex; }
    .nav-item { flex: 1; text-align: center; padding: 0.6rem; background: none; border: none; color: #8b949e; font-weight: bold; cursor: pointer; }
    .nav-item.active { color: #58a6ff; }
    .league-header {
      background: #1f2a3e;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      margin-bottom: 0.3rem;
      font-size: 0.8rem;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="header"><h1>⚽ Scorio</h1></div>

<div class="date-bar">
  <button class="date-btn" id="prevDay">▶</button>
  <button class="date-pill" id="dateDisplay">اليوم</button>
  <button class="date-btn" id="nextDay">◀</button>
</div>

<div id="matchesContainer"><div class="loading"><div class="spinner"></div></div></div>

<div class="bottom-nav">
  <button class="nav-item active" id="navMatches">⚽ المباريات</button>
  <button class="nav-item" id="navLeague">🏆 بطولات</button>
</div>

<script>
  const WORKER_URL = 'https://football-worker.mahdijadir38.workers.dev';
  
  let currentDate = new Date();
  
  function formatDate(date) {
    return `${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}`;
  }
  
  function formatDisplayDate(date) {
    const today = new Date();
    if (formatDate(date) === formatDate(today)) return 'اليوم';
    const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
    return `${date.getDate()} ${months[date.getMonth()]}`;
  }
  
  async function loadMatches() {
    const container = document.getElementById('matchesContainer');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    
    try {
      const url = `${WORKER_URL}/api/matches?date=${formatDate(currentDate)}&force=true`;
      const response = await fetch(url);
      const data = await response.json();
      const matches = data.matches || [];
      
      if (matches.length === 0) {
        container.innerHTML = '<div class="loading">⚽ لا توجد مباريات</div>';
        return;
      }
      
      // تجميع حسب الدوري
      const groups = {};
      for (const m of matches) {
        let leagueName = m.leagueName || m.league || 'مباريات';
        if (leagueName.includes(' at ')) {
          leagueName = leagueName.split(' at ')[0];
        }
        if (!groups[leagueName]) {
          groups[leagueName] = [];
        }
        groups[leagueName].push(m);
      }
      
      let html = '';
      for (const [leagueName, groupMatches] of Object.entries(groups)) {
        html += `<div class="league-header">🏆 ${leagueName}</div>`;
        
        for (const m of groupMatches) {
          const isLive = m.status === 'in';
          const scoreText = m.status === 'pre' ? '-:-' : `${m.homeScore || 0} - ${m.awayScore || 0}`;
          const statusText = m.status === 'pre' ? '⏱️ يبدأ' : (isLive ? '🟢 مباشر' : '✅ انتهت');
          
          html += `
            <div class="match-card" onclick="location.href='match.html?id=${m.id}&league=${m.league}'">
              <div class="match-teams">
                <div class="team">
                  ${m.homeLogo ? `<img style="width:28px;height:28px;object-fit:contain" src="${m.homeLogo}" onerror="this.style.display='none'">` : ''}
                  <div class="team-name">${m.homeTeam}</div>
                </div>
                <div class="score ${isLive ? 'live' : ''}">${scoreText}</div>
                <div class="team">
                  ${m.awayLogo ? `<img style="width:28px;height:28px;object-fit:contain" src="${m.awayLogo}" onerror="this.style.display='none'">` : ''}
                  <div class="team-name">${m.awayTeam}</div>
                </div>
              </div>
              <div class="status">${statusText} ${m.minute ? m.minute + '\'' : ''}</div>
            </div>
          `;
        }
      }
      
      container.innerHTML = html;
      
    } catch (error) {
      container.innerHTML = `<div class="loading">⚠️ خطأ: ${error.message}</div>`;
    }
  }
  
  document.getElementById('prevDay').onclick = () => { currentDate.setDate(currentDate.getDate() - 1); document.getElementById('dateDisplay').textContent = formatDisplayDate(currentDate); loadMatches(); };
  document.getElementById('nextDay').onclick = () => { currentDate.setDate(currentDate.getDate() + 1); document.getElementById('dateDisplay').textContent = formatDisplayDate(currentDate); loadMatches(); };
  document.getElementById('dateDisplay').onclick = () => { currentDate = new Date(); document.getElementById('dateDisplay').textContent = formatDisplayDate(currentDate); loadMatches(); };
  document.getElementById('navLeague').onclick = () => location.href = 'league.html';
  
  document.getElementById('dateDisplay').textContent = formatDisplayDate(currentDate);
  loadMatches();
</script>
</body>
  </html>
