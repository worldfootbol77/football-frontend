<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نتائج المباريات - 7 يونيو 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 1rem;
      max-width: 650px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      color: #58a6ff;
    }
    .date-badge {
      text-align: center;
      background: #161b22;
      padding: 0.5rem;
      border-radius: 20px;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      border: 1px solid #30363d;
    }
    .match-card {
      background: #161b22;
      border-radius: 12px;
      margin-bottom: 1rem;
      padding: 0.8rem;
      border: 1px solid #30363d;
      transition: 0.2s;
    }
    .match-card:hover {
      background: #1f2a3e;
    }
    .league-name {
      font-size: 0.7rem;
      color: #8b949e;
      margin-bottom: 0.5rem;
      text-align: right;
      border-bottom: 1px dashed #30363d;
      padding-bottom: 0.3rem;
    }
    .teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      margin: 0.5rem 0;
    }
    .team {
      flex: 1;
      text-align: center;
    }
    .team-name {
      font-weight: bold;
      font-size: 0.9rem;
    }
    .score {
      font-size: 1.5rem;
      font-weight: 800;
      min-width: 65px;
      text-align: center;
      color: #f0f6fc;
    }
    .status {
      text-align: center;
      font-size: 0.7rem;
      color: #8b949e;
      margin-top: 0.3rem;
    }
    .live { color: #e63946; font-weight: bold; background: #3a1015; display: inline-block; padding: 0.1rem 0.5rem; border-radius: 12px; }
    .loading, .error, .no-matches {
      text-align: center;
      padding: 2rem;
      color: #8b949e;
    }
    .error { color: #f85149; }
    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #6e7681;
    }
  </style>
</head>
<body>

<h1>⚽ نتائج المباريات</h1>
<div class="date-badge">📅 الأحد 7 يونيو 2026</div>

<div id="matches-container">
  <div class="loading">جارٍ تحميل المباريات...</div>
</div>

<footer>البيانات مقدمة من ESPN | Scorio</footer>

<script>
  // رابط API الخاص بـ Worker - تاريخ 7 يونيو 2026
  const API_URL = 'https://football-worker.mahdijadir38.workers.dev/api/matches?date=20260607';

  async function loadMatches() {
    const container = document.getElementById('matches-container');
    try {
      console.log('جاري الاتصال بالـ Worker...');
      const response = await fetch(API_URL);
      if (!response.ok) throw new Error(`خطأ في الشبكة: ${response.status}`);
      
      const data = await response.json();
      console.log('تم استلام البيانات بنجاح:', data);
      
      const matches = data.matches || [];
      
      if (matches.length === 0) {
        container.innerHTML = '<div class="no-matches">⚠️ لا توجد مباريات في هذا اليوم.</div>';
        return;
      }

      // إنشاء HTML لكل مباراة
      let matchesHTML = '';
      for (const match of matches) {
        // تحديد حالة المباراة
        let statusText = '';
        let isLive = false;
        if (match.status === 'in') {
          statusText = `<span class="live">⚡ مباشر ${match.minute || ''}</span>`;
          isLive = true;
        } else if (match.status === 'post') {
          statusText = `✅ انتهت (${match.statusText || ''})`;
        } else {
          statusText = `⏱️ ${match.statusText || 'لم تبدأ بعد'}`;
        }

        // بناء بطاقة المباراة
        matchesHTML += `
          <div class="match-card" style="${isLive ? 'border-right: 3px solid #e63946;' : ''}">
            <div class="league-name">${match.leagueName || match.league || 'دوري غير معروف'}</div>
            <div class="teams">
              <div class="team">
                <div class="team-name">${match.homeTeam}</div>
              </div>
              <div class="score">
                ${match.status === 'pre' ? 'VS' : `${match.homeScore} - ${match.awayScore}`}
              </div>
              <div class="team">
                <div class="team-name">${match.awayTeam}</div>
              </div>
            </div>
            <div class="status">${statusText}</div>
          </div>
        `;
      }
      
      container.innerHTML = matchesHTML;
      
    } catch (error) {
      console.error('فشل التحميل:', error);
      container.innerHTML = `<div class="error">❌ خطأ في تحميل البيانات: ${error.message}<br><br>تأكد من أن الـ Worker يعمل على الرابط: ${API_URL}</div>`;
    }
  }

  // تشغيل التحميل عند فتح الصفحة
  loadMatches();
</script>

</body>
</html>
