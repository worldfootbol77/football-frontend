<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scorio - مباريات اليوم</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Cairo', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      max-width: 650px;
      margin: 0 auto;
      padding-bottom: 70px;
    }
    .header {
      background: #161b22;
      padding: 1rem;
      text-align: center;
      border-bottom: 1px solid #30363d;
      position: sticky;
      top: 0;
    }
    .header h1 { color: #58a6ff; font-size: 1.4rem; }
    .date-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem;
      background: #161b22;
    }
    .date-btn {
      background: #1f2a3e;
      border: none;
      color: white;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      cursor: pointer;
    }
    .date-pill {
      background: #58a6ff;
      color: white;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-weight: bold;
    }
    .league-group {
      margin-top: 0.5rem;
      background: #161b22;
      border-radius: 10px;
      overflow: hidden;
    }
    .league-title {
      background: #1f2a3e;
      padding: 0.5rem 0.8rem;
      font-weight: bold;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .match-card {
      padding: 0.5rem 0.8rem;
      border-bottom: 1px solid #30363d;
      cursor: pointer;
    }
    .match-card:active { background: #1f2a3e; }
    .match-teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }
    .team {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }
    .team-logo { width: 30px; height: 30px; object-fit: contain; }
    .team-name { font-size: 0.8rem; font-weight: 600; text-align: center; }
    .score { font-size: 1.2rem; font-weight: 900; min-width: 60px; text-align: center; }
    .score.live { color: #e63946; }
    .status {
      font-size: 0.65rem;
      color: #8b949e;
      text-align: center;
      margin-top: 0.2rem;
    }
    .live-badge {
      background: #e63946;
      color: white;
      padding: 0.1rem 0.3rem;
      border-radius: 4px;
      font-size: 0.6rem;
    }
    .loading, .empty {
      text-align: center;
      padding: 3rem;
      color: #8b949e;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      max-width: 650px;
      width: 100%;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
    }
    .nav-item {
      flex: 1;
      text-align: center;
      padding: 0.7rem;
      background: none;
      border: none;
      color: #8b949e;
      font-weight: bold;
      cursor: pointer;
    }
    .nav-item.active { color: #58a6ff; }
  </style>
</head>
<body>

<div class="header">
  <h1>⚽ Scorio</h1>
</div>

<div class="date-bar">
  <button class="date-btn" id="prevDay">▶</button>
  <span class="date-pill" id="dateDisplay">اليوم</span>
  <button class="date-btn" id="nextDay">◀</button>
</div>

<div id="matchesContainer">
  <div class="loading"><div class="spinner"></div>جارٍ التحميل...</div>
</div>

<div class="bottom-nav">
  <button class="nav-item active" id="navMatches">⚽ المباريات</button>
  <button class="nav-item" id="navLeagues">🏆 البطولات</button>
</div>

<script>
  const WORKER_URL = 'https://football-worker.mahdijadir38.workers.dev';
  
  let currentDate = new Date();
  let allMatches = [];
  
  function formatDate(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}${month}${day}`;
  }
  
  function formatDisplayDate(date) {
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    
    if (formatDate(date) === formatDate(today)) return 'اليوم';
    if (formatDate(date) === formatDate(yesterday)) return 'أمس';
    if (formatDate(date) === formatDate(tomorrow)) return 'غداً';
    
    const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
    return `${date.getDate()} ${months[date.getMonth()]}`;
  }
  
  function getLeagueIcon(leagueCode) {
    const icons = {
      'uefa.champions': '🏆', 'uefa.europa': '🏆', 'uefa.europa.conf': '🏆',
      'eng.1': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'esp.1': '🇪🇸', 'ger.1': '🇩🇪', 'ita.1': '🇮🇹', 'fra.1': '🇫🇷',
      'ksa.1': '🇸🇦', 'egy.1': '🇪🇬', 'mar.1': '🇲🇦',
      'conmebol.libertadores': '🏆', 'fifa.world': '🌍'
    };
    return icons[leagueCode] || '⚽';
  }
  
  function getLeagueName(leagueCode, originalName) {
    const names = {
      'uefa.champions': 'دوري أبطال أوروبا',
      'uefa.europa': 'الدوري الأوروبي',
      'eng.1': 'الدوري الإنجليزي',
      'esp.1': 'الدوري الإسباني',
      'ger.1': 'الدوري الألماني',
      'ita.1': 'الدوري الإيطالي',
      'fra.1': 'الدوري الفرنسي',
      'ksa.1': 'الدوري السعودي',
      'egy.1': 'الدوري المصري',
      'mar.1': 'الدوري المغربي',
      'conmebol.libertadores': 'كوبا ليبرتادوريس',
      'fifa.world': 'كأس العالم'
    };
    return names[leagueCode] || originalName || leagueCode;
  }
  
  async function loadMatches() {
    const container = document.getElementById('matchesContainer');
    container.innerHTML = '<div class="loading"><div class="spinner"></div>جارٍ التحميل...</div>';
    
    try {
      const dateStr = formatDate(currentDate);
      const url = `${WORKER_URL}/api/matches?date=${dateStr}`;
      console.log('Fetching:', url);
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      allMatches = data.matches || [];
      console.log('Matches:', allMatches.length);
      renderMatches();
    } catch (error) {
      console.error('Error:', error);
      container.innerHTML = `<div class="empty">⚠️ خطأ: ${error.message}</div>`;
    }
  }
  
  function renderMatches() {
    if (allMatches.length === 0) {
      document.getElementById('matchesContainer').innerHTML = '<div class="empty">⚽ لا توجد مباريات في هذا اليوم</div>';
      return;
    }
    
    // تجميع حسب الدوري
    const groups = {};
    for (const m of allMatches) {
      const leagueKey = m.league || 'other';
      if (!groups[leagueKey]) {
        groups[leagueKey] = {
          name: getLeagueName(leagueKey, m.leagueName),
          icon: getLeagueIcon(leagueKey),
          matches: []
        };
      }
      groups[leagueKey].matches.push(m);
    }
    
    let html = '';
    for (const [key, group] of Object.entries(groups)) {
      html += `
        <div class="league-group">
          <div class="league-title">
            <span>${group.icon}</span>
            <span>${group.name}</span>
          </div>
      `;
      
      for (const m of group.matches) {
        const isLive = m.status === 'in';
        const isPost = m.status === 'post';
        
        let scoreHtml, statusHtml;
        if (m.status === 'pre') {
          scoreHtml = '<div class="score">-:-</div>';
          statusHtml = '<div class="status">⏱️ يبدأ قريباً</div>';
        } else {
          scoreHtml = `<div class="score ${isLive ? 'live' : ''}">${m.homeScore || 0} - ${m.awayScore || 0}</div>`;
          if (isLive) {
            statusHtml = `<div class="status"><span class="live-badge">مباشر</span> ${m.minute || ''}'</div>`;
          } else {
            statusHtml = `<div class="status">✅ ${m.statusText || 'انتهت'}</div>`;
          }
        }
        
        html += `
          <div class="match-card" onclick="location.href='match.html?id=${m.id}&league=${m.league}'">
            <div class="match-teams">
              <div class="team">
                ${m.homeLogo ? `<img class="team-logo" src="${m.homeLogo}" onerror="this.style.display='none'">` : ''}
                <span class="team-name">${m.homeTeam}</span>
              </div>
              ${scoreHtml}
              <div class="team">
                ${m.awayLogo ? `<img class="team-logo" src="${m.awayLogo}" onerror="this.style.display='none'">` : ''}
                <span class="team-name">${m.awayTeam}</span>
              </div>
            </div>
            ${statusHtml}
          </div>
        `;
      }
      html += `</div>`;
    }
    
    document.getElementById('matchesContainer').innerHTML = html;
  }
  
  function changeDate(delta) {
    currentDate.setDate(currentDate.getDate() + delta);
    document.getElementById('dateDisplay').textContent = formatDisplayDate(currentDate);
    loadMatches();
  }
  
  document.getElementById('prevDay').onclick = () => changeDate(-1);
  document.getElementById('nextDay').onclick = () => changeDate(1);
  document.getElementById('navLeagues').onclick = () => location.href = 'league.html';
  
  document.getElementById('dateDisplay').textContent = formatDisplayDate(currentDate);
  loadMatches();
</script>
</body>
</html>
