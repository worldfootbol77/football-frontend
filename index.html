<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scorio - مباريات اليوم</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      max-width: 650px;
      margin: 0 auto;
      padding: 1rem;
      padding-bottom: 70px;
    }
    .header { text-align: center; padding: 1rem; background: #161b22; border-radius: 12px; margin-bottom: 1rem; }
    .date-bar { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1rem; }
    .date-btn { background: #1f2a3e; border: none; color: white; padding: 0.3rem 0.8rem; border-radius: 20px; cursor: pointer; }
    .date-pill { background: #58a6ff; color: white; padding: 0.3rem 1rem; border-radius: 20px; font-weight: bold; cursor: pointer; }
    .match-card { background: #161b22; border-radius: 10px; padding: 0.8rem; margin-bottom: 0.5rem; cursor: pointer; }
    .match-card:active { background: #1f2a3e; }
    .match-teams { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .team { flex: 1; text-align: center; }
    .team-name { font-size: 0.85rem; font-weight: bold; }
    .score { font-size: 1.2rem; font-weight: 900; min-width: 60px; text-align: center; }
    .score.live { color: #e63946; }
    .status { font-size: 0.65rem; color: #8b949e; text-align: center; margin-top: 0.3rem; }
    .loading { text-align: center; padding: 2rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .bottom-nav { position: fixed; bottom: 0; max-width: 650px; width: 100%; background: #161b22; border-top: 1px solid #30363d; display: flex; }
    .nav-item { flex: 1; text-align: center; padding: 0.6rem; background: none; border: none; color: #8b949e; font-weight: bold; cursor: pointer; }
    .nav-item.active { color: #58a6ff; }
  </style>
</head>
<body>

<div class="header"><h1>⚽ Scorio</h1></div>

<div class="date-bar">
  <button class="date-btn" id="prevDay">▶</button>
  <button class="date-pill" id="dateDisplay">اليوم</button>
  <button class="date-btn" id="nextDay">◀</button>
</div>

<div id="matchesContainer"><div class="loading"><div class="spinner"></div></div></div>

<div class="bottom-nav">
  <button class="nav-item active" id="navMatches">⚽ المباريات</button>
  <button class="nav-item" id="navLeague">🏆 بطولات</button>
</div>

<script>
  const WORKER_URL = 'https://football-worker.mahdijadir38.workers.dev';
  
  // قائمة منتخبات كأس العالم 2026 (للتمييز)
  const WORLD_CUP_TEAMS = [
    'Qatar', 'Switzerland', 'Morocco', 'Brazil', 'Canada', 'United States', 
    'Mexico', 'Germany', 'France', 'England', 'Spain', 'Argentina', 
    'Portugal', 'Netherlands', 'Belgium', 'Croatia', 'Uruguay', 'Colombia',
    'Japan', 'South Korea', 'Saudi Arabia', 'Iran', 'Australia', 'Senegal',
    'Ghana', 'Cameroon', 'Tunisia', 'Ecuador', 'Paraguay', 'Chile'
  ];
  
  // قائمة منتخبات كأس العالم للشباب
  const YOUTH_WORLD_CUP_TEAMS = [
    'Portugal U20', 'Tunisia U23', 'Congo DR U20', 'Ivory Coast U23'
  ];
  
  // قائمة منتخبات كأس أمم أفريقيا
  const AFRICA_CUP_TEAMS = [
    'Egypt', 'Algeria', 'Nigeria', 'South Africa', 'Morocco', 'Tunisia',
    'Senegal', 'Cameroon', 'Ghana', 'Ivory Coast', 'Mali', 'Burkina Faso',
    'Congo DR', 'Zambia', 'Angola'
  ];
  
  // قائمة منتخبات كأس آسيا
  const ASIA_CUP_TEAMS = [
    'Qatar', 'Japan', 'South Korea', 'Saudi Arabia', 'Iran', 'Australia',
    'UAE', 'Iraq', 'Jordan', 'Oman', 'Bahrain', 'Kuwait', 'Uzbekistan'
  ];
  
  // قائمة منتخبات كوبا أمريكا
  const COPA_AMERICA_TEAMS = [
    'Brazil', 'Argentina', 'Uruguay', 'Colombia', 'Chile', 'Peru',
    'Ecuador', 'Venezuela', 'Bolivia', 'Paraguay'
  ];
  
  function getTournamentName(homeTeam, awayTeam) {
    const allTeams = [homeTeam, awayTeam];
    
    // التحقق من كأس العالم للشباب
    for (const team of allTeams) {
      if (YOUTH_WORLD_CUP_TEAMS.includes(team)) {
        return '🏆 كأس العالم للشباب';
      }
    }
    
    // التحقق من كأس العالم
    let worldCupCount = 0;
    for (const team of allTeams) {
      if (WORLD_CUP_TEAMS.includes(team)) {
        worldCupCount++;
      }
    }
    if (worldCupCount >= 1) {
      return '🌍 كأس العالم 2026';
    }
    
    // التحقق من كأس أمم أفريقيا
    for (const team of allTeams) {
      if (AFRICA_CUP_TEAMS.includes(team)) {
        return '🏆 كأس أمم أفريقيا';
      }
    }
    
    // التحقق من كأس آسيا
    for (const team of allTeams) {
      if (ASIA_CUP_TEAMS.includes(team)) {
        return '🏆 كأس آسيا';
      }
    }
    
    // التحقق من كوبا أمريكا
    for (const team of allTeams) {
      if (COPA_AMERICA_TEAMS.includes(team)) {
        return '🏆 كوبا أمريكا';
      }
    }
    
    return null;
  }
  
  // قاموس ترجمة أكواد الدوريات
  const LEAGUE_TRANSLATION = {
    '2026-league-of-ireland-premier': '🇮🇪 الدوري الأيرلندي الممتاز',
    '2026-bolivian-liga-profesional': '🇧🇴 دوري الدرجة الأولى البوليفي',
    'chi.1': '🇨🇱 الدوري التشيلي',
    'bra.2': '🇧🇷 الدوري البرازيلي الدرجة الثانية',
    'regular-season': '🇦🇷 الدوري الأرجنتيني',
    'first-stage': '🏆 المرحلة الأولى',
    '3rd-place-match': '🏆 مباراة المركز الثالث',
    'finals': '🏆 النهائي',
    'final': '🏆 النهائي'
  };
  
  function getLeagueDisplay(leagueCode, originalName, homeTeam, awayTeam) {
    // 1. ترجمة الدوريات العادية
    if (LEAGUE_TRANSLATION[leagueCode]) {
      return LEAGUE_TRANSLATION[leagueCode];
    }
    
    // 2. معالجة مراحل البطولة (group-stage, round-of-32, etc.)
    if (leagueCode === 'group-stage') {
      const tournamentName = getTournamentName(homeTeam, awayTeam);
      if (tournamentName) {
        return `${tournamentName} - دور المجموعات`;
      }
      return '🏆 دور المجموعات';
    }
    
    if (leagueCode === 'round-of-32') {
      const tournamentName = getTournamentName(homeTeam, awayTeam);
      return tournamentName ? `${tournamentName} - دور الـ 32` : '🏆 دور الـ 32';
    }
    
    if (leagueCode === 'round-of-16') {
      const tournamentName = getTournamentName(homeTeam, awayTeam);
      return tournamentName ? `${tournamentName} - دور الـ 16` : '🏆 دور الـ 16';
    }
    
    if (leagueCode === 'quarter-final') {
      const tournamentName = getTournamentName(homeTeam, awayTeam);
      return tournamentName ? `${tournamentName} - ربع النهائي` : '🏆 ربع النهائي';
    }
    
    if (leagueCode === 'semi-final') {
      const tournamentName = getTournamentName(homeTeam, awayTeam);
      return tournamentName ? `${tournamentName} - نصف النهائي` : '🏆 نصف النهائي';
    }
    
    if (leagueCode === 'final' || leagueCode === 'finals') {
      const tournamentName = getTournamentName(homeTeam, awayTeam);
      return tournamentName ? `${tournamentName} - النهائي` : '🏆 النهائي';
    }
    
    // 3. تنظيف الأسماء التي تحتوي على "at"
    if (originalName && originalName.includes(' at ')) {
      const cleaned = leagueCode.replace(/^\d{4}-/, '').replace(/-/g, ' ');
      const titleCase = cleaned.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      return `🏆 ${titleCase}`;
    }
    
    return originalName || leagueCode;
  }

  let currentDate = new Date();
  
  function formatDate(date) {
    return `${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}`;
  }
  
  function formatDisplayDate(date) {
    const today = new Date();
    if (formatDate(date) === formatDate(today)) return 'اليوم';
    const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
    return `${date.getDate()} ${months[date.getMonth()]}`;
  }
  
  async function loadMatches() {
    const container = document.getElementById('matchesContainer');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    
    try {
      const url = `${WORKER_URL}/api/matches?date=${formatDate(currentDate)}&force=true`;
      const response = await fetch(url);
      const data = await response.json();
      const matches = data.matches || [];
      
      if (matches.length === 0) {
        container.innerHTML = '<div class="loading">⚽ لا توجد مباريات</div>';
        return;
      }
      
      // تجميع حسب الدوري
      const groups = {};
      for (const m of matches) {
        const leagueKey = m.league || 'other';
        if (!groups[leagueKey]) {
          groups[leagueKey] = {
            name: getLeagueDisplay(leagueKey, m.leagueName, m.homeTeam, m.awayTeam),
            matches: []
          };
        }
        groups[leagueKey].matches.push(m);
      }
      
      let html = '';
      for (const [key, group] of Object.entries(groups)) {
        const flag = group.name.substring(0, 2);
        html += `<div style="margin-bottom:0.5rem;">`;
        html += `<div style="background:#1f2a3e; padding:0.3rem 0.8rem; border-radius:8px; margin-bottom:0.3rem; font-size:0.75rem; font-weight:bold;">${flag} ${group.name}</div>`;
        
        for (const m of group.matches) {
          const isLive = m.status === 'in';
          const scoreText = m.status === 'pre' ? '-:-' : `${m.homeScore || 0} - ${m.awayScore || 0}`;
          const statusText = m.status === 'pre' ? '⏱️ يبدأ' : (isLive ? '🟢 مباشر' : '✅ انتهت');
          
          html += `
            <div class="match-card" onclick="location.href='match.html?id=${m.id}&league=${m.league}'">
              <div class="match-teams">
                <div class="team"><div class="team-name">${m.homeTeam}</div></div>
                <div class="score ${isLive ? 'live' : ''}">${scoreText}</div>
                <div class="team"><div class="team-name">${m.awayTeam}</div></div>
              </div>
              <div class="status">${statusText} ${m.minute ? m.minute + '\'' : ''}</div>
            </div>
          `;
        }
        html += `</div>`;
      }
      
      container.innerHTML = html;
      
    } catch (error) {
      container.innerHTML = `<div class="loading">⚠️ خطأ: ${error.message}</div>`;
    }
  }
  
  document.getElementById('prevDay').onclick = () => { currentDate.setDate(currentDate.getDate() - 1); document.getElementById('dateDisplay').textContent = formatDisplayDate(currentDate); loadMatches(); };
  document.getElementById('nextDay').onclick = () => { currentDate.setDate(currentDate.getDate() + 1); document.getElementById('dateDisplay').textContent = formatDisplayDate(currentDate); loadMatches(); };
  document.getElementById('dateDisplay').onclick = () => { currentDate = new Date(); document.getElementById('dateDisplay').textContent = formatDisplayDate(currentDate); loadMatches(); };
  document.getElementById('navLeague').onclick = () => location.href = 'league.html';
  
  document.getElementById('dateDisplay').textContent = formatDisplayDate(currentDate);
  loadMatches();
</script>
</body>
</html>
