<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Scorio - نتائج مباريات كرة القدم</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #1f2a3e;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #a0b3c8;
      --green: #4ade80;
      --red: #e63946;
      --blue: #58a6ff;
      --orange: #f97316;
      --yellow: #f59e0b;
    }

    body {
      font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 0;
      max-width: 650px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 70px;
    }

    .app-header {
      position: sticky;
      top: 0;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }
    .logo { font-size: 1.4rem; font-weight: 900; }
    .logo span { color: var(--blue); }
    .hdr-btn {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.3rem;
    }

    .status-tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 57px;
      z-index: 99;
    }
    .status-tab {
      flex: 1;
      padding: 0.7rem;
      text-align: center;
      background: none;
      border: none;
      color: var(--text2);
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
    }
    .status-tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }
    .live-badge {
      background: var(--red);
      color: white;
      border-radius: 10px;
      padding: 0.1rem 0.4rem;
      font-size: 0.65rem;
      margin-right: 0.3rem;
    }
    .hidden { display: none !important; }

    .date-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.6rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .date-pill {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 25px;
      padding: 0.4rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
    }
    .date-nav {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 34px;
      height: 34px;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .league-sep {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.8rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text2);
      cursor: pointer;
    }
    .league-sep .chevron { margin-right: auto; transition: transform 0.2s; }
    .league-sep.collapsed .chevron { transform: rotate(-90deg); }
    .league-matches.hidden { display: none; }

    .match-card {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .match-card:active { background: var(--bg3); }
    .match-card.live { border-right: 3px solid var(--red); }
    
    .match-league {
      font-size: 0.65rem;
      color: var(--text2);
      text-align: right;
      margin-bottom: 0.3rem;
    }
    .match-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.3rem;
    }
    .match-team {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }
    .match-logo { width: 28px; height: 28px; object-fit: contain; }
    .match-team-name { font-weight: 700; font-size: 0.8rem; text-align: center; }
    .match-score { font-size: 1.2rem; font-weight: 900; min-width: 55px; text-align: center; }
    .match-score.live { color: var(--red); }
    .match-status { font-size: 0.65rem; color: var(--text2); text-align: center; margin-top: 0.3rem; }
    .live-badge-small { background: var(--red); color: white; font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 4px; }

    .loading, .empty-state { text-align: center; padding: 3rem; color: var(--text2); }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      max-width: 650px;
      width: 100%;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    .bn-item {
      flex: 1;
      padding: 0.6rem;
      text-align: center;
      background: none;
      border: none;
      color: var(--text2);
      font-weight: 700;
      cursor: pointer;
    }
    .bn-item.active { color: var(--blue); }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 200;
    }
    .modal-content {
      background: var(--bg2);
      border-radius: 15px 15px 0 0;
      padding: 1.5rem;
      width: 100%;
      max-width: 650px;
    }
    .modal-selects { display: flex; gap: 0.5rem; margin: 1rem 0; }
    .modal-selects select {
      flex: 1;
      padding: 0.5rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
    }
    .modal-buttons { display: flex; gap: 0.5rem; }
    .modal-btn {
      flex: 1;
      padding: 0.6rem;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
    .modal-btn.primary { background: var(--blue); color: white; }
    .modal-btn.secondary { background: var(--bg3); color: var(--text2); }

    .refresh-bar {
      position: fixed;
      bottom: 65px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg3);
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.7rem;
      display: none;
      z-index: 200;
    }
    .refresh-bar.visible { display: block; }
    .refresh-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      margin-left: 0.3rem;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 50% { opacity: 0.3; } }

    .divider { height: 0.4rem; background: var(--bg); }
  </style>
</head>
<body>

<header class="app-header">
  <button class="hdr-btn" id="btn-menu">☰</button>
  <div class="logo">Scorio <span>⚽</span></div>
  <button class="hdr-btn" id="btn-cal">📅</button>
</header>

<div class="status-tabs">
  <button class="status-tab active" data-filter="all">الكل</button>
  <button class="status-tab" data-filter="live">مباشر <span id="live-count" class="live-badge hidden">0</span></button>
  <button class="status-tab" data-filter="pre">القادمة</button>
  <button class="status-tab" data-filter="post">انتهت</button>
</div>

<div class="date-bar">
  <button class="date-nav" id="prev-day">›</button>
  <button class="date-pill" id="date-pill">اليوم</button>
  <button class="date-nav" id="next-day">‹</button>
</div>

<div id="matches-container">
  <div class="loading"><div class="spinner"></div>جارٍ تحميل المباريات...</div>
</div>

<nav class="bottom-nav">
  <button class="bn-item active" id="nav-matches">⚽ المباريات</button>
  <button class="bn-item" id="nav-league">🏆 بطولات</button>
</nav>

<div class="refresh-bar" id="refresh-bar">
  <span class="refresh-dot"></span> يتم التحديث تلقائياً
</div>

<script>
  const WORKER_URL = 'https://football-worker.mahdijadir38.workers.dev';
  
  // قائمة منتخبات كأس العالم 2026
  const WORLD_CUP_TEAMS = [
    'Brazil', 'Argentina', 'Uruguay', 'Colombia', 'Ecuador', 'Chile', 'Paraguay', 'Peru', 'Venezuela', 'Bolivia',
    'Germany', 'France', 'England', 'Spain', 'Italy', 'Netherlands', 'Portugal', 'Belgium', 'Croatia', 'Switzerland',
    'Denmark', 'Sweden', 'Poland', 'Austria', 'Czech Republic', 'Serbia', 'Scotland', 'Wales', 'Turkey', 'Ukraine',
    'Morocco', 'Senegal', 'Tunisia', 'Algeria', 'Nigeria', 'Cameroon', 'Ghana', 'Ivory Coast', 'Egypt', 'South Africa',
    'Qatar', 'Japan', 'South Korea', 'Saudi Arabia', 'Iran', 'Australia', 'UAE', 'Iraq', 'Jordan', 'Oman', 'Bahrain', 'Kuwait',
    'United States', 'Canada', 'Mexico', 'Haiti', 'Jamaica', 'Costa Rica', 'Panama'
  ];
  
  // قائمة فرق كأس العالم للشباب
  const YOUTH_WORLD_CUP_TEAMS = ['U20', 'U23', 'U19'];
  
  // دالة تحديد البطولة من الفريقين
  function getTournamentName(homeTeam, awayTeam) {
    const allTeams = [homeTeam, awayTeam];
    
    // التحقق من كأس العالم للشباب
    for (const team of allTeams) {
      for (const youth of YOUTH_WORLD_CUP_TEAMS) {
        if (team.includes(youth)) {
          return '🏆 كأس العالم للشباب';
        }
      }
    }
    
    // التحقق من كأس العالم
    let worldCupCount = 0;
    for (const team of allTeams) {
      if (WORLD_CUP_TEAMS.includes(team)) {
        worldCupCount++;
      }
    }
    if (worldCupCount >= 1) {
      return '🌍 كأس العالم 2026';
    }
    
    return null;
  }
  
  // دالة الحصول على اسم المجموعة المعروض
  function getGroupDisplayName(matches) {
    if (!matches || matches.length === 0) return '🏆 مباريات';
    
    const firstMatch = matches[0];
    const tournamentName = getTournamentName(firstMatch.homeTeam, firstMatch.awayTeam);
    
    if (tournamentName) {
      return `${tournamentName} - دور المجموعات`;
    }
    
    // إذا كانت مباراة عادية، استخدم leagueName
    if (firstMatch.leagueName && !firstMatch.leagueName.includes(' at ')) {
      return firstMatch.leagueName;
    }
    
    return '🏆 مباريات';
  }

  let currentDate = localStorage.getItem('selectedDate') || getTodayStr();
  let allMatches = [];
  let activeFilter = 'all';
  let refreshTimer = null;

  function getTodayStr() {
    const d = new Date();
    return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatDateDisplay(dateStr) {
    if (!dateStr || dateStr.length !== 8) return 'اليوم';
    const year = dateStr.slice(0,4);
    const month = dateStr.slice(4,6);
    const day = dateStr.slice(6,8);
    const today = getTodayStr();
    const yesterday = getOffsetDate(-1);
    const tomorrow = getOffsetDate(1);
    
    if (dateStr === today) return 'اليوم';
    if (dateStr === yesterday) return 'أمس';
    if (dateStr === tomorrow) return 'غداً';
    
    const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    return `${parseInt(day)} ${months[parseInt(month)-1]} ${year}`;
  }

  function getOffsetDate(n) {
    const d = new Date();
    d.setDate(d.getDate() + n);
    return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatTime(isoDate) {
    try {
      const d = new Date(isoDate);
      return d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    } catch { return ''; }
  }

  async function fetchMatches() {
    const container = document.getElementById('matches-container');
    container.innerHTML = '<div class="loading"><div class="spinner"></div>جارٍ تحميل المباريات...</div>';
    
    try {
      const url = `${WORKER_URL}/api/matches?date=${currentDate}&force=true`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      allMatches = data.matches || [];
      updateLiveBadge();
      renderMatches();
      
      localStorage.setItem('selectedDate', currentDate);
      
      const hasLive = allMatches.some(m => m.status === 'in');
      const refreshBar = document.getElementById('refresh-bar');
      if (hasLive) {
        refreshBar.classList.add('visible');
        if (refreshTimer) clearTimeout(refreshTimer);
        refreshTimer = setTimeout(fetchMatches, 60000);
      } else {
        refreshBar.classList.remove('visible');
      }
    } catch (error) {
      container.innerHTML = `<div class="empty-state">⚠️ خطأ في التحميل: ${error.message}</div>`;
    }
  }

  function updateLiveBadge() {
    const liveCount = allMatches.filter(m => m.status === 'in').length;
    const badge = document.getElementById('live-count');
    if (liveCount > 0) {
      badge.textContent = liveCount;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  }

  function renderMatches() {
    let filtered = [...allMatches];
    if (activeFilter === 'live') filtered = filtered.filter(m => m.status === 'in');
    else if (activeFilter === 'pre') filtered = filtered.filter(m => m.status === 'pre');
    else if (activeFilter === 'post') filtered = filtered.filter(m => m.status === 'post');
    
    if (filtered.length === 0) {
      document.getElementById('matches-container').innerHTML = '<div class="empty-state">⚽ لا توجد مباريات</div>';
      return;
    }
    
    // فصل المباريات: مباريات كأس العالم vs مباريات عادية
    const worldCupMatches = [];
    const otherMatches = [];
    
    for (const m of filtered) {
      const tournamentName = getTournamentName(m.homeTeam, m.awayTeam);
      if (tournamentName === '🌍 كأس العالم 2026') {
        worldCupMatches.push(m);
      } else {
        otherMatches.push(m);
      }
    }
    
    let html = '';
    
    // عرض مباريات كأس العالم
    if (worldCupMatches.length > 0) {
      const displayName = '🌍 كأس العالم 2026 - دور المجموعات';
      const icon = '🌍';
      html += `
        <div class="league-sep" onclick="this.classList.toggle('collapsed'); this.nextElementSibling.classList.toggle('hidden')">
          <span>${icon}</span>
          <span style="flex:1">${displayName}</span>
          <span class="chevron">▼</span>
        </div>
        <div class="league-matches">
      `;
      
      for (const m of worldCupMatches) {
        const isLive = m.status === 'in';
        let scoreHtml, statusHtml;
        
        if (m.status === 'pre') {
          scoreHtml = '<div class="match-score">-:-</div>';
          statusHtml = `<div class="match-status">⏱️ ${formatTime(m.date)}</div>`;
        } else {
          scoreHtml = `<div class="match-score ${isLive ? 'live' : ''}">${m.homeScore || 0} - ${m.awayScore || 0}</div>`;
          if (isLive) {
            statusHtml = `<div class="match-status"><span class="live-badge-small">مباشر</span> ${m.minute || ''}</div>`;
          } else {
            statusHtml = `<div class="match-status">✅ ${m.statusText || 'انتهت'}</div>`;
          }
        }
        
        html += `
          <div class="match-card ${isLive ? 'live' : ''}" onclick="window.location.href='match.html?id=${m.id}&league=${m.league}'">
            <div class="match-league">
              <span>${icon}</span>
              <span>${displayName}</span>
            </div>
            <div class="match-row">
              <div class="match-team">
                ${m.homeLogo ? `<img class="match-logo" src="${m.homeLogo}" onerror="this.style.display='none'">` : ''}
                <div class="match-team-name">${m.homeTeam}</div>
              </div>
              ${scoreHtml}
              <div class="match-team">
                ${m.awayLogo ? `<img class="match-logo" src="${m.awayLogo}" onerror="this.style.display='none'">` : ''}
                <div class="match-team-name">${m.awayTeam}</div>
              </div>
            </div>
            ${statusHtml}
          </div>
        `;
      }
      html += `</div><div class="divider"></div>`;
    }
    
    // عرض باقي المباريات (مجمعة حسب league)
    if (otherMatches.length > 0) {
      const groups = {};
      for (const m of otherMatches) {
        const leagueKey = m.league || 'other';
        if (!groups[leagueKey]) {
          let displayName = m.leagueName || leagueKey;
          if (displayName.includes(' at ')) {
            displayName = leagueKey.replace(/^\d{4}-/, '').replace(/-/g, ' ');
            displayName = displayName.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
          }
          groups[leagueKey] = {
            name: displayName,
            matches: []
          };
        }
        groups[leagueKey].matches.push(m);
      }
      
      for (const [key, group] of Object.entries(groups)) {
        const icon = group.name.substring(0, 2);
        html += `
          <div class="league-sep" onclick="this.classList.toggle('collapsed'); this.nextElementSibling.classList.toggle('hidden')">
            <span>${icon}</span>
            <span style="flex:1">${group.name}</span>
            <span class="chevron">▼</span>
          </div>
          <div class="league-matches">
        `;
        
        for (const m of group.matches) {
          const isLive = m.status === 'in';
          let scoreHtml, statusHtml;
          
          if (m.status === 'pre') {
            scoreHtml = '<div class="match-score">-:-</div>';
            statusHtml = `<div class="match-status">⏱️ ${formatTime(m.date)}</div>`;
          } else {
            scoreHtml = `<div class="match-score ${isLive ? 'live' : ''}">${m.homeScore || 0} - ${m.awayScore || 0}</div>`;
            if (isLive) {
              statusHtml = `<div class="match-status"><span class="live-badge-small">مباشر</span> ${m.minute || ''}</div>`;
            } else {
              statusHtml = `<div class="match-status">✅ ${m.statusText || 'انتهت'}</div>`;
            }
          }
          
          html += `
            <div class="match-card ${isLive ? 'live' : ''}" onclick="window.location.href='match.html?id=${m.id}&league=${m.league}'">
              <div class="match-league">
                <span>${icon}</span>
                <span>${group.name}</span>
              </div>
              <div class="match-row">
                <div class="match-team">
                  ${m.homeLogo ? `<img class="match-logo" src="${m.homeLogo}" onerror="this.style.display='none'">` : ''}
                  <div class="match-team-name">${m.homeTeam}</div>
                </div>
                ${scoreHtml}
                <div class="match-team">
                  ${m.awayLogo ? `<img class="match-logo" src="${m.awayLogo}" onerror="this.style.display='none'">` : ''}
                  <div class="match-team-name">${m.awayTeam}</div>
                </div>
              </div>
              ${statusHtml}
            </div>
          `;
        }
        html += `</div><div class="divider"></div>`;
      }
    }
    
    document.getElementById('matches-container').innerHTML = html;
  }

  function changeDate(offset) {
    const d = new Date(`${currentDate.slice(0,4)}-${currentDate.slice(4,6)}-${currentDate.slice(6,8)}`);
    d.setDate(d.getDate() + offset);
    currentDate = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    document.getElementById('date-pill').textContent = formatDateDisplay(currentDate);
    fetchMatches();
  }

  function showDateModal() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <div class="modal-content">
        <h3 style="text-align:center">اختر تاريخاً</h3>
        <div class="modal-selects">
          <select id="modal-day"></select>
          <select id="modal-month">
            <option value="01">يناير</option><option value="02">فبراير</option>
            <option value="03">مارس</option><option value="04">أبريل</option>
            <option value="05">مايو</option><option value="06">يونيو</option>
            <option value="07">يوليو</option><option value="08">أغسطس</option>
            <option value="09">سبتمبر</option><option value="10">أكتوبر</option>
            <option value="11">نوفمبر</option><option value="12">ديسمبر</option>
          </select>
          <select id="modal-year"></select>
        </div>
        <div class="modal-buttons">
          <button class="modal-btn primary" id="modal-ok">عرض</button>
          <button class="modal-btn secondary" id="modal-cancel">إلغاء</button>
        </div>
      </div>
    `;
    
    const daySelect = modal.querySelector('#modal-day');
    for (let i = 1; i <= 31; i++) daySelect.innerHTML += `<option value="${String(i).padStart(2,'0')}">${i}</option>`;
    
    const yearSelect = modal.querySelector('#modal-year');
    const currentYear = new Date().getFullYear();
    for (let i = currentYear; i >= 2020; i--) yearSelect.innerHTML += `<option value="${i}">${i}</option>`;
    
    const now = new Date();
    daySelect.value = String(now.getDate()).padStart(2,'0');
    modal.querySelector('#modal-month').value = String(now.getMonth() + 1).padStart(2,'0');
    yearSelect.value = String(now.getFullYear());
    
    document.body.appendChild(modal);
    
    modal.querySelector('#modal-ok').onclick = () => {
      const y = modal.querySelector('#modal-year').value;
      const m = modal.querySelector('#modal-month').value;
      const d = modal.querySelector('#modal-day').value;
      currentDate = `${y}${m}${d}`;
      document.getElementById('date-pill').textContent = formatDateDisplay(currentDate);
      modal.remove();
      fetchMatches();
    };
    
    modal.querySelector('#modal-cancel').onclick = () => modal.remove();
    modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  }

  function setFilter(filter) {
    activeFilter = filter;
    document.querySelectorAll('.status-tab').forEach(tab => {
      if (tab.dataset.filter === filter) tab.classList.add('active');
      else tab.classList.remove('active');
    });
    renderMatches();
  }

  document.getElementById('prev-day').onclick = () => changeDate(-1);
  document.getElementById('next-day').onclick = () => changeDate(1);
  document.getElementById('date-pill').onclick = showDateModal;
  document.getElementById('btn-cal').onclick = showDateModal;
  
  document.querySelectorAll('.status-tab').forEach(tab => {
    tab.onclick = () => setFilter(tab.dataset.filter);
  });
  
  document.getElementById('nav-league').onclick = () => {
    window.location.href = 'league.html';
  };
  
  document.getElementById('date-pill').textContent = formatDateDisplay(currentDate);
  fetchMatches();
</script>
</body>
</html>
