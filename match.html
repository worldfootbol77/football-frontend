<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل المباراة - Scorio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Cairo', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      max-width: 650px;
      margin: 0 auto;
    }
    .header {
      background: #161b22;
      padding: 1rem;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
    }
    .back-btn {
      background: none;
      border: none;
      color: #58a6ff;
      font-size: 1.2rem;
      cursor: pointer;
    }
    .loading, .error {
      text-align: center;
      padding: 3rem;
      color: #8b949e;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .match-hero {
      background: #161b22;
      padding: 1rem;
      border-bottom: 1px solid #30363d;
    }
    .hero-teams {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin: 1rem 0;
    }
    .hero-team {
      flex: 1;
      text-align: center;
    }
    .hero-logo {
      width: 55px;
      height: 55px;
      object-fit: contain;
    }
    .hero-score {
      font-size: 2rem;
      font-weight: 900;
      min-width: 80px;
      text-align: center;
    }
    .hero-status {
      text-align: center;
      font-size: 0.8rem;
      color: #8b949e;
    }
    .tabs {
      display: flex;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    .tab {
      flex: 1;
      padding: 0.8rem;
      text-align: center;
      background: none;
      border: none;
      color: #8b949e;
      font-weight: 700;
      cursor: pointer;
    }
    .tab.active {
      color: #58a6ff;
      border-bottom: 2px solid #58a6ff;
    }
    .tab-panel { display: none; padding: 0.5rem; }
    .tab-panel.active { display: block; }
    .event-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem;
      border-bottom: 1px solid #30363d;
    }
    .section-title {
      padding: 0.5rem;
      background: #1f2a3e;
      font-size: 0.8rem;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">→</button>
  <h2>تفاصيل المباراة</h2>
</div>

<div id="content">
  <div class="loading"><div class="spinner"></div>جارٍ التحميل...</div>
</div>

<script>
  const WORKER_URL = 'https://football-worker.mahdijadir38.workers.dev';
  
  async function loadMatch() {
    const params = new URLSearchParams(window.location.search);
    const matchId = params.get('id');
    const league = params.get('league') || '';
    
    console.log('matchId:', matchId, 'league:', league);
    
    if (!matchId) {
      document.getElementById('content').innerHTML = '<div class="error">❌ معرف المباراة غير موجود</div>';
      return;
    }
    
    try {
      const url = `${WORKER_URL}/api/summary?matchId=${matchId}&league=${league}`;
      console.log('جلب من:', url);
      const response = await fetch(url);
      console.log('Response status:', response.status);
      
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      console.log('البيانات:', data);
      
      if (data.error) throw new Error(data.error);
      
      renderMatch(data);
    } catch (error) {
      console.error('خطأ:', error);
      document.getElementById('content').innerHTML = `<div class="error">❌ خطأ: ${error.message}<br><br>ID: ${matchId}<br>League: ${league}</div>`;
    }
  }
  
  function renderMatch(data) {
    const isLive = data.status === 'in';
    
    const html = `
      <div class="match-hero">
        <div style="text-align:center;color:#8b949e;font-size:0.7rem">${data.leagueName || ''}</div>
        <div class="hero-teams">
          <div class="hero-team">
            ${data.homeLogo ? `<img class="hero-logo" src="${data.homeLogo}" onerror="this.style.display='none'">` : ''}
            <div><strong>${data.homeTeam}</strong></div>
          </div>
          <div class="hero-score">${data.homeScore} - ${data.awayScore}</div>
          <div class="hero-team">
            ${data.awayLogo ? `<img class="hero-logo" src="${data.awayLogo}" onerror="this.style.display='none'">` : ''}
            <div><strong>${data.awayTeam}</strong></div>
          </div>
        </div>
        <div class="hero-status">
          ${isLive ? `🟢 مباشر ${data.minute || ''}'` : data.statusText || 'انتهت'}
        </div>
        ${data.venue ? `<div style="text-align:center;font-size:0.7rem;margin-top:0.5rem">🏟️ ${data.venue}</div>` : ''}
      </div>
      
      <div class="tabs">
        <button class="tab active" data-tab="details">⚽ التفاصيل</button>
        <button class="tab" data-tab="stats">📊 الإحصائيات</button>
      </div>
      
      <div class="tab-panel active" id="tab-details">
        <div class="section-title">⚽ الأهداف</div>
        ${(data.goals || []).map(g => `
          <div class="event-row">
            <span>${g.minute || ''}'</span>
            <span>⚽</span>
            <span><strong>${g.player || ''}</strong> (${g.team || ''})</span>
          </div>
        `).join('') || '<div style="padding:1rem;text-align:center">لا توجد أهداف</div>'}
        
        <div class="section-title">🟨 البطاقات</div>
        ${(data.cards || []).map(c => `
          <div class="event-row">
            <span>${c.minute || ''}'</span>
            <span>${c.type?.includes('Red') ? '🟥' : '🟨'}</span>
            <span><strong>${c.player || ''}</strong> (${c.team || ''})</span>
          </div>
        `).join('') || '<div style="padding:1rem;text-align:center">لا توجد بطاقات</div>'}
      </div>
      
      <div class="tab-panel" id="tab-stats">
        ${(data.homeStats || []).map((s, i) => `
          <div class="event-row">
            <span style="flex:1;text-align:right">${s.value}</span>
            <span style="flex:2;text-align:center">${s.name}</span>
            <span style="flex:1;text-align:left">${data.awayStats?.[i]?.value || '-'}</span>
          </div>
        `).join('') || '<div style="padding:1rem;text-align:center">لا توجد إحصائيات</div>'}
      </div>
    `;
    
    document.getElementById('content').innerHTML = html;
    
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
      };
    });
  }
  
  loadMatch();
</script>
</body>
</html>
