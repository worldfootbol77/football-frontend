<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل المباراة - Scorio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Cairo', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      max-width: 650px;
      margin: 0 auto;
      padding-bottom: 70px;
    }
    .header {
      background: #161b22;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      border-bottom: 1px solid #30363d;
    }
    .back-btn {
      background: none;
      border: none;
      color: #58a6ff;
      font-size: 1.2rem;
      cursor: pointer;
    }
    .match-hero {
      background: #161b22;
      padding: 1rem;
      text-align: center;
    }
    .league-name {
      font-size: 0.7rem;
      color: #8b949e;
      margin-bottom: 0.5rem;
    }
    .teams {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin: 1rem 0;
    }
    .team {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }
    .team-logo { width: 60px; height: 60px; object-fit: contain; }
    .team-name { font-size: 0.9rem; font-weight: bold; }
    .score {
      font-size: 2rem;
      font-weight: 900;
      min-width: 80px;
      text-align: center;
    }
    .score.live { color: #e63946; }
    .status {
      font-size: 0.8rem;
      color: #8b949e;
      margin-top: 0.5rem;
    }
    .tabs {
      display: flex;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    .tab {
      flex: 1;
      padding: 0.7rem;
      text-align: center;
      background: none;
      border: none;
      color: #8b949e;
      font-weight: bold;
      cursor: pointer;
    }
    .tab.active {
      color: #58a6ff;
      border-bottom: 2px solid #58a6ff;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .section-title {
      background: #1f2a3e;
      padding: 0.4rem 0.8rem;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .event-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.8rem;
      border-bottom: 1px solid #30363d;
      font-size: 0.85rem;
    }
    .loading, .error {
      text-align: center;
      padding: 3rem;
      color: #8b949e;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">→</button>
  <h2>تفاصيل المباراة</h2>
</div>

<div id="content">
  <div class="loading"><div class="spinner"></div>جارٍ التحميل...</div>
</div>

<script>
  const WORKER_URL = 'https://football-worker.mahdijadir38.workers.dev';
  
  async function loadMatch() {
    const params = new URLSearchParams(window.location.search);
    const matchId = params.get('id');
    const league = params.get('league') || '';
    
    if (!matchId) {
      document.getElementById('content').innerHTML = '<div class="error">❌ معرف المباراة غير موجود</div>';
      return;
    }
    
    try {
      const url = `${WORKER_URL}/api/summary?matchId=${matchId}&league=${league}`;
      console.log('Fetching:', url);
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      console.log('Data:', data);
      
      if (data.error) throw new Error(data.error);
      renderMatch(data);
    } catch (error) {
      document.getElementById('content').innerHTML = `<div class="error">❌ خطأ: ${error.message}</div>`;
    }
  }
  
  function renderMatch(data) {
    const isLive = data.status === 'in';
    
    // أسماء الدوريات
    const leagueNames = {
      'uefa.champions': 'دوري أبطال أوروبا',
      'uefa.europa': 'الدوري الأوروبي',
      'eng.1': 'الدوري الإنجليزي',
      'esp.1': 'الدوري الإسباني',
      'ger.1': 'الدوري الألماني',
      'ita.1': 'الدوري الإيطالي',
      'fra.1': 'الدوري الفرنسي',
      'ksa.1': 'الدوري السعودي',
      'egy.1': 'الدوري المصري',
      'mar.1': 'الدوري المغربي',
      'fifa.world': 'كأس العالم',
      'fifa.cwc': 'كأس العالم للأندية'
    };
    const leagueName = leagueNames[data.league] || data.leagueName || data.league;
    
    const html = `
      <div class="match-hero">
        <div class="league-name">${leagueName}</div>
        <div class="teams">
          <div class="team">
            ${data.homeLogo ? `<img class="team-logo" src="${data.homeLogo}" onerror="this.style.display='none'">` : '<div style="width:60px"></div>'}
            <div class="team-name">${data.homeTeam}</div>
          </div>
          <div class="score ${isLive ? 'live' : ''}">${data.homeScore} - ${data.awayScore}</div>
          <div class="team">
            ${data.awayLogo ? `<img class="team-logo" src="${data.awayLogo}" onerror="this.style.display='none'">` : '<div style="width:60px"></div>'}
            <div class="team-name">${data.awayTeam}</div>
          </div>
        </div>
        <div class="status">
          ${isLive ? `🟢 مباشر ${data.minute || ''}'` : (data.statusText || 'انتهت')}
        </div>
        ${data.venue ? `<div style="font-size:0.7rem;margin-top:0.5rem">🏟️ ${data.venue}</div>` : ''}
      </div>
      
      <div class="tabs">
        <button class="tab active" data-tab="details">⚽ الأهداف والبطاقات</button>
        <button class="tab" data-tab="stats">📊 الإحصائيات</button>
      </div>
      
      <div class="tab-panel active" id="tab-details">
        <div class="section-title">⚽ الأهداف</div>
        ${(data.goals || []).map(g => `
          <div class="event-row">
            <span style="min-width:35px">${g.minute || ''}'</span>
            <span>⚽</span>
            <span><strong>${g.player || ''}</strong> (${g.team || ''})</span>
          </div>
        `).join('') || '<div style="padding:0.8rem;text-align:center">لا توجد أهداف</div>'}
        
        <div class="section-title">🟨 البطاقات</div>
        ${(data.cards || []).map(c => `
          <div class="event-row">
            <span style="min-width:35px">${c.minute || ''}'</span>
            <span>${c.type?.includes('Red') ? '🟥' : '🟨'}</span>
            <span><strong>${c.player || ''}</strong> (${c.team || ''})</span>
          </div>
        `).join('') || '<div style="padding:0.8rem;text-align:center">لا توجد بطاقات</div>'}
      </div>
      
      <div class="tab-panel" id="tab-stats">
        ${(data.homeStats || []).map((s, i) => `
          <div class="event-row">
            <span style="flex:1;text-align:right">${s.value}</span>
            <span style="flex:2;text-align:center">${s.name}</span>
            <span style="flex:1;text-align:left">${data.awayStats?.[i]?.value || '-'}</span>
          </div>
        `).join('') || '<div style="padding:0.8rem;text-align:center">لا توجد إحصائيات</div>'}
      </div>
    `;
    
    document.getElementById('content').innerHTML = html;
    
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
      };
    });
  }
  
  loadMatch();
</script>
</body>
</html>
