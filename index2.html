<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scorio - مباريات اليوم</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      max-width: 650px;
      margin: 0 auto;
      padding: 1rem;
      padding-bottom: 70px;
    }
    .header {
      text-align: center;
      padding: 1rem;
      background: #161b22;
      border-radius: 12px;
      margin-bottom: 1rem;
    }
    .date-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .date-btn {
      background: #1f2a3e;
      border: none;
      color: white;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      cursor: pointer;
    }
    .date-pill {
      background: #58a6ff;
      color: white;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-weight: bold;
    }
    .match-card {
      background: #161b22;
      border-radius: 10px;
      padding: 0.8rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
    }
    .match-card:active { background: #1f2a3e; }
    .match-league {
      font-size: 0.7rem;
      color: #8b949e;
      margin-bottom: 0.3rem;
    }
    .match-teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }
    .team {
      flex: 1;
      text-align: center;
    }
    .team-name { font-size: 0.85rem; font-weight: bold; }
    .score {
      font-size: 1.2rem;
      font-weight: 900;
      min-width: 60px;
      text-align: center;
    }
    .status {
      font-size: 0.65rem;
      color: #8b949e;
      text-align: center;
      margin-top: 0.3rem;
    }
    .loading { text-align: center; padding: 2rem; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <h1>⚽ Scorio</h1>
</div>

<div class="date-bar">
  <button class="date-btn" id="prevDay">▶</button>
  <span class="date-pill" id="dateDisplay">اليوم</span>
  <button class="date-btn" id="nextDay">◀</button>
</div>

<div id="matchesContainer">
  <div class="loading"><div class="spinner"></div></div>
</div>

<script>
  const WORKER_URL = 'https://football-worker.mahdijadir38.workers.dev';
  
  let currentDate = new Date();
  
  function formatDate(date) {
    return `${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}`;
  }
  
  function formatDisplayDate(date) {
    const today = new Date();
    if (formatDate(date) === formatDate(today)) return 'اليوم';
    const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
    return `${date.getDate()} ${months[date.getMonth()]}`;
  }
  
  async function loadMatches() {
    const container = document.getElementById('matchesContainer');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    
    try {
      const url = `${WORKER_URL}/api/matches?date=${formatDate(currentDate)}`;
      const response = await fetch(url);
      const data = await response.json();
      const matches = data.matches || [];
      
      if (matches.length === 0) {
        container.innerHTML = '<div class="loading">⚽ لا توجد مباريات</div>';
        return;
      }
      
      // تجميع حسب الدوري
      const groups = {};
      for (const m of matches) {
        const leagueKey = m.league || 'other';
        if (!groups[leagueKey]) {
          groups[leagueKey] = {
            name: m.leagueName || leagueKey,
            matches: []
          };
        }
        groups[leagueKey].matches.push(m);
      }
      
      let html = '';
      for (const [key, group] of Object.entries(groups)) {
        html += `<div style="margin-bottom: 0.5rem;">`;
        html += `<div style="background:#1f2a3e; padding:0.3rem 0.8rem; border-radius:8px; margin-bottom:0.3rem; font-size:0.75rem; font-weight:bold;">${group.name}</div>`;
        
        for (const m of group.matches) {
          const isLive = m.status === 'in';
          const scoreText = m.status === 'pre' ? '-:-' : `${m.homeScore || 0} - ${m.awayScore || 0}`;
          const statusText = m.status === 'pre' ? '⏱️ يبدأ' : (isLive ? '🟢 مباشر' : '✅ انتهت');
          
          html += `
            <div class="match-card" onclick="location.href='match.html?id=${m.id}&league=${m.league}'">
              <div class="match-teams">
                <div class="team">
                  <div class="team-name">${m.homeTeam}</div>
                </div>
                <div class="score ${isLive ? 'live' : ''}">${scoreText}</div>
                <div class="team">
                  <div class="team-name">${m.awayTeam}</div>
                </div>
              </div>
              <div class="status">${statusText} ${m.minute ? m.minute + '\'' : ''}</div>
            </div>
          `;
        }
        html += `</div>`;
      }
      
      container.innerHTML = html;
      
    } catch (error) {
      container.innerHTML = `<div class="loading">⚠️ خطأ: ${error.message}</div>`;
    }
  }
  
  document.getElementById('prevDay').onclick = () => {
    currentDate.setDate(currentDate.getDate() - 1);
    document.getElementById('dateDisplay').textContent = formatDisplayDate(currentDate);
    loadMatches();
  };
  
  document.getElementById('nextDay').onclick = () => {
    currentDate.setDate(currentDate.getDate() + 1);
    document.getElementById('dateDisplay').textContent = formatDisplayDate(currentDate);
    loadMatches();
  };
  
  document.getElementById('dateDisplay').textContent = formatDisplayDate(currentDate);
  loadMatches();
</script>
</body>
</html>
