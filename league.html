<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>الدوري - Scorio</title>
  <meta name="description" content="ترتيب الفرق والهدافين ومباريات الدوري">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body data-page="league">

  <!-- Header -->
  <header class="page-header">
    <button class="back-btn" onclick="history.back()">&#8594;</button>
    <div class="ph-title">Scorio</div>
    <div class="ph-icons">
      <button class="hdr-btn">&#128269;</button>
    </div>
  </header>

  <!-- League Hero -->
  <div id="league-hero">
    <div class="loading-spinner"><div class="spinner"></div></div>
  </div>

  <!-- Season Selector -->
  <div class="season-row" id="season-row" style="display:none">
    <span>الموسم</span>
    <select class="season-sel" id="season-select"></select>
  </div>

  <!-- League Tabs -->
  <div class="detail-tabs" id="league-tabs" style="display:none">
    <button class="detail-tab" data-tab="matches">المباريات</button>
    <button class="detail-tab active" data-tab="standings">ترتيب الفرق</button>
    <button class="detail-tab" data-tab="scorers">ترتيب الهدافين</button>
  </div>

  <!-- Tab Panels -->
  <div id="tab-matches"   class="tab-panel"></div>
  <div id="tab-standings" class="tab-panel active"></div>
  <div id="tab-scorers"   class="tab-panel"></div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="bn-item" onclick="location.href='/'">
      <span class="bn-icon">&#9917;</span>
      <span>المباريات</span>
    </button>
    <button class="bn-item active">
      <span class="bn-icon">&#127942;</span>
      <span>البطولات</span>
    </button>
  </nav>

  <script src="/assets/js/app.js"></script>
</body>
</html>
