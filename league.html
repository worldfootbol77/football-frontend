<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>البطولات - Scorio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Cairo', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      max-width: 650px;
      margin: 0 auto;
      padding-bottom: 70px;
    }
    .header {
      background: #161b22;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      border-bottom: 1px solid #30363d;
    }
    .back-btn {
      background: none;
      border: none;
      color: #58a6ff;
      font-size: 1.2rem;
      cursor: pointer;
    }
    .selector {
      padding: 0.8rem;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    select {
      width: 100%;
      padding: 0.5rem;
      background: #1f2a3e;
      border: 1px solid #30363d;
      color: white;
      border-radius: 8px;
    }
    .tabs {
      display: flex;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    .tab {
      flex: 1;
      padding: 0.7rem;
      text-align: center;
      background: none;
      border: none;
      color: #8b949e;
      font-weight: bold;
      cursor: pointer;
    }
    .tab.active {
      color: #58a6ff;
      border-bottom: 2px solid #58a6ff;
    }
    .tab-panel { display: none; padding: 0.5rem; }
    .tab-panel.active { display: block; }
    .standings-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }
    .standings-table th, .standings-table td {
      padding: 0.4rem 0.2rem;
      border-bottom: 1px solid #30363d;
      text-align: center;
    }
    .standings-table td:first-child { font-weight: bold; }
    .standings-table td:nth-child(2) { text-align: right; }
    .scorer-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      border-bottom: 1px solid #30363d;
    }
    .scorer-rank { width: 30px; font-weight: bold; }
    .scorer-rank.gold { color: #f59e0b; }
    .scorer-rank.silver { color: #94a3b8; }
    .scorer-rank.bronze { color: #cd7f32; }
    .scorer-name { flex: 1; }
    .scorer-goals { font-weight: bold; color: #4ade80; }
    .loading, .empty { text-align: center; padding: 2rem; color: #8b949e; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      max-width: 650px;
      width: 100%;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
    }
    .nav-item {
      flex: 1;
      text-align: center;
      padding: 0.7rem;
      background: none;
      border: none;
      color: #8b949e;
      font-weight: bold;
      cursor: pointer;
    }
    .nav-item.active { color: #58a6ff; }
  </style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">→</button>
  <h2>البطولات</h2>
</div>

<div class="selector">
  <select id="leagueSelect">
    <option value="eng.1">🏴󠁧󠁢󠁥󠁮󠁧󠁿 الدوري الإنجليزي</option>
    <option value="esp.1">🇪🇸 الدوري الإسباني</option>
    <option value="ger.1">🇩🇪 الدوري الألماني</option>
    <option value="ita.1">🇮🇹 الدوري الإيطالي</option>
    <option value="fra.1">🇫🇷 الدوري الفرنسي</option>
    <option value="ksa.1">🇸🇦 الدوري السعودي</option>
    <option value="egy.1">🇪🇬 الدوري المصري</option>
    <option value="mar.1">🇲🇦 الدوري المغربي</option>
    <option value="uefa.champions">🏆 دوري أبطال أوروبا</option>
    <option value="fifa.world">🌍 كأس العالم</option>
  </select>
</div>

<div class="tabs">
  <button class="tab active" data-tab="standings">🏆 الترتيب</button>
  <button class="tab" data-tab="scorers">⚽ الهدافون</button>
</div>

<div class="tab-panel active" id="tab-standings"><div class="loading"><div class="spinner"></div></div></div>
<div class="tab-panel" id="tab-scorers"><div class="loading"><div class="spinner"></div></div></div>

<div class="bottom-nav">
  <button class="nav-item" id="navMatches">⚽ المباريات</button>
  <button class="nav-item active">🏆 البطولات</button>
</div>

<script>
  const WORKER_URL = 'https://football-worker.mahdijadir38.workers.dev';
  let currentLeague = 'eng.1';
  
  async function loadStandings() {
    const container = document.getElementById('tab-standings');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      const response = await fetch(`${WORKER_URL}/api/standings?league=${currentLeague}`);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      
      if (!data.entries || !data.entries.length) {
        container.innerHTML = '<div class="empty">لا توجد بيانات</div>';
        return;
      }
      
      let html = '<table class="standings-table"><thead><tr><th>#</th><th>الفريق</th><th>ل</th><th>ف</th><th>ت</th><th>خ</th><th>فا</th><th>ن</th></tr></thead><tbody>';
      for (const e of data.entries) {
        html += `<tr>
          <td>${e.rank}</td>
          <td>${e.team}</td>
          <td>${e.gp}</td>
          <td>${e.w}</td>
          <td>${e.d}</td>
          <td>${e.l}</td>
          <td>${e.gd > 0 ? '+' : ''}${e.gd}</td>
          <td><strong>${e.pts}</strong></td>
        </tr>`;
      }
      html += '</tbody></table>';
      container.innerHTML = html;
    } catch (error) {
      container.innerHTML = `<div class="empty">⚠️ خطأ: ${error.message}</div>`;
    }
  }
  
  async function loadScorers() {
    const container = document.getElementById('tab-scorers');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      const response = await fetch(`${WORKER_URL}/api/scorers?league=${currentLeague}`);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      
      if (!data.scorers || !data.scorers.length) {
        container.innerHTML = '<div class="empty">لا توجد بيانات</div>';
        return;
      }
      
      let html = '';
      for (const s of data.scorers) {
        let rankClass = '';
        if (s.rank === 1) rankClass = 'gold';
        else if (s.rank === 2) rankClass = 'silver';
        else if (s.rank === 3) rankClass = 'bronze';
        html += `
          <div class="scorer-row">
            <div class="scorer-rank ${rankClass}">${s.rank}</div>
            <div class="scorer-name">${s.name}</div>
            <div class="scorer-goals">${s.goals}</div>
          </div>
        `;
      }
      container.innerHTML = html;
    } catch (error) {
      container.innerHTML = `<div class="empty">⚠️ خطأ: ${error.message}</div>`;
    }
  }
  
  document.getElementById('leagueSelect').onchange = (e) => {
    currentLeague = e.target.value;
    loadStandings();
    loadScorers();
  };
  
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
    };
  });
  
  document.getElementById('navMatches').onclick = () => location.href = 'index.html';
  
  loadStandings();
  loadScorers();
</script>
</body>
</html>
